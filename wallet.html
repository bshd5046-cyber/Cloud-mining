<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet | VERTEX PREMIER</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-dark: #020617; 
            --primary: #3b82f6; 
            --accent: #8b5cf6;
            --nav-bg: rgba(7, 10, 22, 0.98); 
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #ffffff; 
            overflow-x: hidden;
            background: 
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                #020617;
            min-height: 100vh;
        }
        
        #mainContent { display: none; }

        .crypto-card {
            background: linear-gradient(135deg, rgba(30, 64, 175, 0.4) 0%, rgba(124, 58, 237, 0.4) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; overflow: hidden;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.6);
            border-radius: 2.5rem;
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .bottom-nav { 
            background: var(--nav-bg); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            height: 85px; 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000; padding-bottom: 15px; 
        }

        .invest-fab { 
            width: 68px; height: 68px; 
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            position: relative; top: -28px; 
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.6); 
            border: 6px solid #020617; 
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #475569; text-decoration: none; font-size: 10px; font-weight: 700; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }

        .slide-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: flex-end; }
        .panel-content { width: 100%; background: #070b16; border-radius: 3.5rem 3.5rem 0 0; padding: 2.5rem; border-top: 1px solid rgba(59, 130, 246, 0.2); transform: translateY(100%); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .show-panel .panel-content { transform: translateY(0); }
        
        .market-row { transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .skeleton { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>

<body class="pb-32">

    <div id="mainContent" class="animate-fadeIn">
        <div class="px-8 pt-16 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">My <span class="text-blue-500">Vault</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <p class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em]">Secure Node: Active</p>
                </div>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center border border-blue-500/20">
                <i class="fas fa-shield-halved text-blue-500 text-xl"></i>
            </div>
        </div>

        <div class="px-6 mt-8">
            <div class="crypto-card p-9">
                <div class="flex justify-between items-start mb-16">
                    <div>
                        <p class="text-blue-200 text-[10px] uppercase tracking-[0.2em] font-black opacity-60">Secured Balance</p>
                        <h2 id="userBalance" class="text-5xl font-black mt-2 tracking-tighter text-white">$ --.--</h2>
                    </div>
                    <div class="bg-black/20 px-4 py-2 rounded-2xl backdrop-blur-md border border-white/5">
                        <i class="fab fa-ethereum text-blue-400"></i>
                    </div>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-blue-200 text-[9px] uppercase font-bold mb-1 opacity-40">Master Protocol ID</p>
                        <p id="userName" class="text-sm font-black tracking-widest italic uppercase text-slate-200">--- ---</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-emerald-400 font-black uppercase tracking-tighter mb-1">Network</p>
                        <p class="text-xs font-black text-white italic">USDT.TRC20</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-6 mt-10 flex gap-4">
            <button onclick="openPanel('depositPanel')" class="flex-1 bg-blue-600 py-5 rounded-[2rem] flex items-center justify-center gap-3 shadow-xl shadow-blue-600/20 active:scale-95 transition-all">
                <i class="fas fa-arrow-down-long text-xs"></i>
                <span class="font-black uppercase text-[11px] tracking-[0.15em]">Deposit</span>
            </button>
            <button onclick="openPanel('withdrawPanel')" class="flex-1 glass-panel py-5 rounded-[2rem] flex items-center justify-center gap-3 active:scale-95 transition-all border-white/5">
                <i class="fas fa-arrow-up-long text-xs"></i>
                <span class="font-black uppercase text-[11px] tracking-[0.15em]">Withdraw</span>
            </button>
        </div>

        <div class="px-6 mt-12">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-black text-[11px] uppercase tracking-[0.3em] text-slate-600">Global Markets</h3>
                <span class="text-[9px] font-bold text-blue-500 bg-blue-500/10 px-2 py-1 rounded-lg italic">Real-time</span>
            </div>
            <div id="assetsList" class="glass-panel rounded-[2.5rem] overflow-hidden">
                <div class="p-6 flex items-center justify-between opacity-20">
                    <div class="flex items-center gap-4"><div class="w-12 h-12 rounded-2xl skeleton"></div><div class="space-y-2"><div class="w-20 h-3 skeleton rounded"></div><div class="w-12 h-2 skeleton rounded"></div></div></div>
                    <div class="w-16 h-8 skeleton rounded-xl"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="depositPanel" class="slide-panel">
        <div class="panel-content">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-10" onclick="closePanel('depositPanel')"></div>
            <div class="flex items-center gap-4 mb-8">
                <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 border border-blue-500/20">
                    <i class="fas fa-qrcode text-2xl"></i>
                </div>
                <div>
                    <h3 class="text-xl font-black uppercase italic text-white">Deposit <span class="text-blue-500">Hub</span></h3>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Protocol: TRC-20 Tether</p>
                </div>
            </div>
            
            <div class="glass-panel p-7 rounded-[2.2rem] mb-8 border-blue-500/10">
                <p class="text-[9px] text-slate-600 uppercase font-black mb-4 tracking-[0.2em]">Personal Node Address</p>
                <div class="flex justify-between items-center gap-4 bg-black/40 p-4 rounded-2xl border border-white/5">
                    <p id="walletAddrDisplay" class="text-[11px] font-mono font-bold text-blue-400 truncate tracking-tighter text-white">Fetching address...</p>
                    <button id="copyBtn" class="bg-blue-600 p-2 rounded-lg text-xs text-white active:scale-90 transition-all"><i class="fas fa-copy"></i></button>
                </div>
            </div>

            <div class="space-y-4">
                <input type="number" id="depAmount" placeholder="0.00" class="w-full bg-slate-900/50 border border-white/5 py-6 px-8 rounded-[2rem] font-black outline-none focus:border-blue-500/50 transition-all text-white text-xl">
                <button id="confirmDepositBtn" class="w-full bg-blue-600 py-6 rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-2xl shadow-blue-600/40 text-white active:scale-95 transition-all">Confirm Protocol</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center">
            <a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a>
        </div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('mainContent').style.display = 'block';
                
                // الاستماع المباشر لبيانات المستخدم
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // تحديث الرصيد والاسم
                        const balance = data.balance || 0;
                        document.getElementById('userBalance').innerText = `$${parseFloat(balance).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                        document.getElementById('userName').innerText = data.fullName || "PREMIER AGENT";
                        
                        // تحديث عنوان المحفظة داخل الـ Panel
                        const walletAddr = data.walletAddress || "No Address Assigned";
                        document.getElementById('walletAddrDisplay').innerText = walletAddr;
                    }
                });
            } else { window.location.replace('login.html'); }
        });

        // زر النسخ
        document.getElementById('copyBtn').addEventListener('click', () => {
            const addr = document.getElementById('walletAddrDisplay').innerText;
            if(addr && addr !== "Fetching address...") {
                navigator.clipboard.writeText(addr);
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i>', 2000);
            }
        });

        // تأكيد الإيداع
        document.getElementById('confirmDepositBtn').addEventListener('click', async () => {
            const amount = document.getElementById('depAmount').value;
            if(!amount || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }

            const btn = document.getElementById('confirmDepositBtn');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                // حفظ العملية في Firebase لمراجعة الأدمن
                await addDoc(collection(db, "users", currentUserId, "deposits"), {
                    amount: parseFloat(amount),
                    status: "pending",
                    timestamp: new Date().toISOString(),
                    type: "USDT.TRC20"
                });
                
                alert("Deposit request submitted! Please send the exact amount to the address shown.");
                closePanel('depositPanel');
                document.getElementById('depAmount').value = "";
            } catch (e) {
                alert("Error submitting request.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirm Protocol";
            }
        });

        window.openPanel = (id) => {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            setTimeout(() => el.classList.add('show-panel'), 10);
        };

        window.closePanel = (id) => {
            const el = document.getElementById(id);
            el.classList.remove('show-panel');
            setTimeout(() => el.style.display = 'none', 400);
        };

        // دالة جلب أسعار العملات
        async function fetchMarketData() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                const assets = [
                    { id: 'bitcoin', name: 'Bitcoin', symbol: 'BTC', icon: 'fa-bitcoin', color: 'text-orange-500' },
                    { id: 'ethereum', name: 'Ethereum', symbol: 'ETH', icon: 'fa-ethereum', color: 'text-blue-400' },
                    { id: 'binancecoin', name: 'BNB Smart Chain', symbol: 'BNB', icon: 'fa-coins', color: 'text-yellow-500' }
                ];
                let html = '';
                assets.forEach(asset => {
                    const price = data[asset.id].usd;
                    const change = data[asset.id].usd_24h_change || 0;
                    html += `
                    <div class="market-row p-6 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/5">
                                <i class="fab ${asset.icon} ${asset.color} text-xl"></i>
                            </div>
                            <div>
                                <p class="font-black text-sm text-white">${asset.name}</p>
                                <p class="text-[9px] text-slate-500 font-black tracking-widest uppercase">${asset.symbol}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-sm text-white">$${price.toLocaleString()}</p>
                            <p class="text-[10px] ${change >= 0 ? 'text-emerald-500' : 'text-red-500'} font-bold">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</p>
                        </div>
                    </div>`;
                });
                document.getElementById('assetsList').innerHTML = html;
            } catch (e) { console.error(e); }
        }
        fetchMarketData();
    </script>
</body>
</html>
