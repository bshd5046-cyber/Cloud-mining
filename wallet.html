<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet | VERTEX PREMIER</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-dark: #050810; 
            --primary: #3b82f6; 
            --nav-bg: rgba(10, 15, 28, 0.96); 
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #ffffff; 
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #050810 100%);
            min-height: 100vh;
        }
        
        #mainContent { display: none; }

        /* Crypto Virtual Card */
        .crypto-card {
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-radius: 2.5rem;
        }

        .crypto-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shine 8s infinite linear;
        }

        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* المنيو السفلي الموحد - 85px */
        .bottom-nav { 
            background: var(--nav-bg); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            height: 85px; 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000; padding-bottom: 15px; 
        }

        .invest-fab { 
            width: 68px; height: 68px; 
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            position: relative; top: -28px; 
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.5); 
            border: 6px solid var(--bg-dark); 
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; font-size: 10px; font-weight: 700; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        .slide-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: flex-end; }
        .panel-content { width: 100%; background: #0a1120; border-radius: 3.5rem 3.5rem 0 0; padding: 2.5rem; border-top: 1px solid rgba(255,255,255,0.1); transform: translateY(100%); transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .show-panel .panel-content { transform: translateY(0); }
        
        .skeleton { background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>

<body class="pb-32">

    <div id="mainContent">
        <div class="px-8 pt-16 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">My <span class="text-blue-500">Wallet</span></h1>
                <p id="lastUpdate" class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em] mt-1">Live Protocol Assets</p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center border border-blue-500/20">
                <i class="fas fa-wallet text-blue-500 text-xl"></i>
            </div>
        </div>

        <div class="px-6 mt-8">
            <div class="crypto-card p-8">
                <div class="flex justify-between items-start mb-14">
                    <div>
                        <p class="text-blue-100 text-[10px] uppercase tracking-[0.2em] opacity-70 font-black">Available Balance</p>
                        <h2 id="userBalance" class="text-4xl font-black mt-2 tracking-tight">$ --.--</h2>
                    </div>
                    <div class="bg-white/10 px-4 py-1.5 rounded-full backdrop-blur-md border border-white/10">
                        <span class="text-[10px] font-black italic tracking-widest text-emerald-400">TRC20</span>
                    </div>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-blue-100 text-[10px] uppercase opacity-50 font-bold mb-1">Node Holder</p>
                        <p id="userName" class="text-md font-black tracking-wide italic uppercase">--- ---</p>
                    </div>
                    <img src="https://cryptologos.cc/logos/tether-usdt-logo.svg?v=025" class="w-10 h-10 shadow-xl" alt="USDT">
                </div>
            </div>
        </div>

        <div class="px-6 mt-8 flex gap-4">
            <button onclick="openPanel('depositPanel')" class="flex-1 bg-blue-600 py-5 rounded-[1.8rem] flex items-center justify-center gap-3 shadow-2xl shadow-blue-600/20 active:scale-95 transition-all">
                <i class="fas fa-plus-circle"></i>
                <span class="font-black uppercase text-xs tracking-widest">Deposit</span>
            </button>
            <button onclick="openPanel('withdrawPanel')" class="flex-1 glass-panel py-5 rounded-[1.8rem] flex items-center justify-center gap-3 active:scale-95 transition-all border-white/10">
                <i class="fas fa-arrow-up-right-from-square"></i>
                <span class="font-black uppercase text-xs tracking-widest">Withdraw</span>
            </button>
        </div>

        <div class="px-6 mt-12">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-black text-[11px] uppercase tracking-[0.3em] text-slate-500">Market Performance</h3>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="text-[9px] font-black text-slate-400 uppercase">Live Node</span>
                </div>
            </div>
            <div id="assetsList" class="space-y-4">
                <div class="skeleton h-24 w-full rounded-[2rem] opacity-20"></div>
                <div class="skeleton h-24 w-full rounded-[2rem] opacity-20"></div>
            </div>
        </div>
    </div>

    <div id="depositPanel" class="slide-panel">
        <div class="panel-content">
            <div class="w-16 h-1.5 bg-white/10 rounded-full mx-auto mb-8" onclick="closePanel('depositPanel')"></div>
            <h3 class="text-2xl font-black uppercase italic mb-2 text-blue-500">Inbound <span class="text-white">Protocol</span></h3>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-8">Network: USDT TRC-20 Only</p>
            
            <div class="glass-panel p-6 rounded-[2rem] mb-8 border-blue-500/20">
                <p class="text-[9px] text-slate-500 uppercase font-black mb-3 tracking-widest">Node Destination Address</p>
                <div class="flex justify-between items-center gap-4">
                    <p class="text-xs font-mono font-bold text-blue-400 truncate">TYG678sjdHksl927NSkw028NskLp12</p>
                    <button class="text-[10px] font-black text-white bg-blue-600 px-4 py-2 rounded-xl shadow-lg shadow-blue-600/30">COPY</button>
                </div>
            </div>

            <div class="space-y-4">
                <input type="number" id="depAmount" placeholder="Amount ($)" class="w-full bg-white/5 border border-white/10 py-5 px-8 rounded-[1.8rem] font-bold outline-none focus:border-blue-500 transition-all text-white">
                <button id="confirmDeposit" class="w-full bg-blue-600 py-5 rounded-[1.8rem] font-black uppercase tracking-[0.2em] shadow-xl">Initiate Deposit</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center">
            <a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a>
        </div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('mainContent').style.display = 'block';
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        userBalance = data.balance || 0;
                        document.getElementById('userBalance').innerText = `$${parseFloat(userBalance).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                        document.getElementById('userName').innerText = data.fullName;
                    }
                });
            } else {
                window.location.replace('login.html');
            }
        });

        window.openPanel = (id) => {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            setTimeout(() => el.classList.add('show-panel'), 10);
        };

        window.closePanel = (id) => {
            const el = document.getElementById(id);
            el.classList.remove('show-panel');
            setTimeout(() => el.style.display = 'none', 400);
        };

        // Market Data Logic
        async function fetchMarketData() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,binancecoin&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                const assets = [
                    { id: 'bitcoin', name: 'Bitcoin', symbol: 'BTC', icon: 'fa-bitcoin', color: 'text-orange-500', bg: 'bg-orange-500/10' },
                    { id: 'ethereum', name: 'Ethereum', symbol: 'ETH', icon: 'fa-ethereum', color: 'text-indigo-400', bg: 'bg-indigo-400/10' },
                    { id: 'binancecoin', name: 'BNB', symbol: 'BNB', icon: 'fa-coins', color: 'text-yellow-400', bg: 'bg-yellow-400/10' }
                ];
                let html = '';
                assets.forEach(asset => {
                    const price = data[asset.id].usd;
                    const change = data[asset.id].usd_24h_change || 0;
                    html += `
                    <div class="glass-panel p-6 rounded-[2.2rem] flex items-center justify-between border-white/5">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 ${asset.bg} rounded-2xl flex items-center justify-center border border-white/5">
                                <i class="fab ${asset.icon} ${asset.color} text-xl"></i>
                            </div>
                            <div>
                                <p class="font-black text-[14px] text-white">${asset.name}</p>
                                <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">${asset.symbol}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-[14px] text-white">$${price.toLocaleString()}</p>
                            <p class="text-[9px] ${change >= 0 ? 'text-emerald-400' : 'text-red-400'} font-black italic">${change.toFixed(2)}%</p>
                        </div>
                    </div>`;
                });
                document.getElementById('assetsList').innerHTML = html;
            } catch (e) { console.error(e); }
        }
        fetchMarketData();
        setInterval(fetchMarketData, 30000);
    </script>
</body>
</html>
