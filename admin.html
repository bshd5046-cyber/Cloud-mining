<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel | VERTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #02040a; font-family: 'Inter', sans-serif; color: #e2e8f0; overflow-x: hidden; }
        .admin-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; opacity: 1; }
        #authOverlay { position: fixed; inset: 0; background: #02040a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        input { transition: 0.3s; }
        input:focus { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.05) !important; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="text-center w-full max-w-xs p-6">
            <div class="w-16 h-16 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <i class="fas fa-user-shield text-2xl text-blue-500"></i>
            </div>
            <h1 class="text-xl font-black italic uppercase text-blue-500 mb-6">Vertex <span class="text-white">Admin</span></h1>
            <div class="space-y-4">
                <input type="text" id="adminUser" placeholder="Admin Email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none">
                <input type="password" id="adminPass" placeholder="Access Key" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none">
                <button id="unlockBtn" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-blue-700 transition active:scale-95">Unlock System</button>
            </div>
            <p id="errorMsg" class="text-red-500 text-[10px] mt-4 hidden font-black uppercase tracking-tighter">Access Denied: Invalid Credentials</p>
        </div>
    </div>

    <header class="p-6 border-b border-white/5 bg-black/20 flex justify-between items-center">
        <h1 class="text-xl font-black italic uppercase tracking-tighter text-blue-500">Vertex <span class="text-white">Master</span></h1>
        <button onclick="location.reload()" class="text-[10px] font-black uppercase bg-red-500/10 text-red-500 px-4 py-2 rounded-lg hover:bg-red-500/20 transition">Lock Panel</button>
    </header>

    <main class="p-6 space-y-8 max-w-4xl mx-auto">
        <section class="admin-card p-6 rounded-[2.5rem]">
            <h2 class="text-[10px] font-black uppercase mb-4 text-gray-500 tracking-widest">User Search Engine</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="userSearchInput" placeholder="Enter User UID..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none">
                <button id="searchBtn" class="bg-blue-600 px-6 rounded-xl font-black uppercase text-[10px] hover:bg-blue-700 transition active:scale-95">Search</button>
            </div>

            <div id="searchResult" class="hidden p-6 border border-white/5 rounded-[2rem] bg-white/5">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 id="resName" class="text-xl font-black italic">---</h3>
                        <p id="resUID" class="text-[9px] text-gray-500 font-mono mt-1">---</p>
                    </div>
                    <div class="text-right">
                        <p id="resBalance" class="text-2xl font-black text-blue-500">$0.00</p>
                        <p id="resStatus" class="text-[9px] font-bold uppercase mt-1 text-green-500">Status: Active</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button id="addMoney" class="py-4 bg-blue-600/10 hover:bg-blue-600/20 rounded-2xl text-[10px] font-black uppercase transition border border-blue-500/20">+ Add $100</button>
                    <button id="subMoney" class="py-4 bg-orange-600/10 hover:bg-orange-600/20 rounded-2xl text-[10px] font-black uppercase transition border border-orange-500/20">- Subtract $100</button>
                    <button id="banBtn" class="col-span-2 py-4 bg-red-500/10 text-red-500 rounded-2xl text-[10px] font-black uppercase border border-red-500/20 hover:bg-red-500/20 transition">Restrict Access (Ban)</button>
                </div>
            </div>
        </section>

        <section>
            <div class="flex gap-6 mb-4 px-2">
                <button id="tabDep" class="tab-btn active text-[10px] font-black uppercase py-2 transition tracking-widest">Deposits</button>
                <button id="tabWith" class="tab-btn text-[10px] font-black uppercase py-2 transition tracking-widest opacity-40">Withdrawals</button>
            </div>

            <div class="admin-card rounded-[2.5rem] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[9px] uppercase text-gray-500 font-black">
                        <tr>
                            <th class="p-5">User ID</th>
                            <th class="p-5">Amount</th>
                            <th class="p-5">Status / Action</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody" class="text-xs font-bold divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUID = null;

        // دالة الدخول
        const checkAccess = () => {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if(user === "admin.com" && pass === "admin123") {
                document.getElementById('authOverlay').style.display = 'none';
                loadRequests('deposits');
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        };

        // تفعيل الزر والـ Enter
        document.getElementById('unlockBtn').onclick = checkAccess;
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAccess(); });

        // البحث
        document.getElementById('searchBtn').onclick = async () => {
            const uid = document.getElementById('userSearchInput').value.trim();
            if(!uid) return;
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()){
                const d = snap.data();
                currentUID = uid;
                document.getElementById('searchResult').classList.remove('hidden');
                document.getElementById('resName').innerText = d.fullName;
                document.getElementById('resUID').innerText = "UID: " + uid;
                document.getElementById('resBalance').innerText = `$${parseFloat(d.balance || 0).toFixed(2)}`;
                document.getElementById('resStatus').innerText = d.isBanned ? "Status: BANNED" : "Status: ACTIVE";
                document.getElementById('resStatus').className = `text-[9px] font-bold uppercase mt-1 ${d.isBanned ? 'text-red-500' : 'text-green-500'}`;
            } else { alert("User Not Found"); }
        };

        // تعديل الرصيد
        const adjustBalance = async (amount) => {
            if(!currentUID) return;
            const ref = doc(db, "users", currentUID);
            const snap = await getDoc(ref);
            const newBal = (snap.data().balance || 0) + amount;
            await updateDoc(ref, { balance: newBal });
            document.getElementById('resBalance').innerText = `$${newBal.toFixed(2)}`;
        };

        document.getElementById('addMoney').onclick = () => adjustBalance(100);
        document.getElementById('subMoney').onclick = () => adjustBalance(-100);

        // حظر
        document.getElementById('banBtn').onclick = async () => {
            if(!currentUID) return;
            const ref = doc(db, "users", currentUID);
            const snap = await getDoc(ref);
            const isBanned = snap.data().isBanned || false;
            await updateDoc(ref, { isBanned: !isBanned });
            alert(isBanned ? "User Unbanned" : "User Banned");
            document.getElementById('searchBtn').click();
        };

        // الطلبات
        async function loadRequests(type) {
            document.getElementById('tabDep').classList.toggle('active', type === 'deposits');
            document.getElementById('tabWith').classList.toggle('active', type === 'withdrawals');
            document.getElementById('tabDep').style.opacity = type === 'deposits' ? '1' : '0.4';
            document.getElementById('tabWith').style.opacity = type === 'withdrawals' ? '1' : '0.4';

            const snap = await getDocs(collection(db, type));
            const tbody = document.getElementById('requestTableBody');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="p-5 text-gray-500 font-mono">${d.id.substring(0,8)}...</td>
                    <td class="p-5 text-blue-500 font-black">$${data.amount}</td>
                    <td class="p-5">
                        ${data.status === 'pending' ? 
                        `<button class="approve-btn bg-blue-600 px-4 py-2 rounded-lg text-[8px] uppercase tracking-widest hover:bg-blue-700 transition" data-id="${d.id}" data-uid="${data.userId}" data-amount="${data.amount}">Approve</button>` : 
                        '<span class="text-gray-600 uppercase text-[8px] tracking-widest">Completed</span>'}
                    </td>`;
                tbody.appendChild(row);
            });

            // ربط أزرار الموافقة
            document.querySelectorAll('.approve-btn').forEach(btn => {
                btn.onclick = async () => {
                    const { id, uid, amount } = btn.dataset;
                    if(!confirm(`Approve $${amount}?`)) return;
                    
                    if(type === 'deposits') {
                        const uRef = doc(db, "users", uid);
                        const uSnap = await getDoc(uRef);
                        await updateDoc(uRef, { balance: (uSnap.data().balance || 0) + parseFloat(amount) });
                    }
                    await updateDoc(doc(db, type, id), { status: 'completed' });
                    alert("Transaction Confirmed");
                    loadRequests(type);
                };
            });
        }

        document.getElementById('tabDep').onclick = () => loadRequests('deposits');
        document.getElementById('tabWith').onclick = () => loadRequests('withdrawals');

    </script>
</body>
</html>
