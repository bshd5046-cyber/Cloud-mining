<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel | AMANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #02040a; font-family: 'Inter', sans-serif; color: #e2e8f0; overflow-x: hidden; }
        .admin-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; opacity: 1; }
        #authOverlay { position: fixed; inset: 0; background: #02040a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">Checking Admin Privileges...</p>
        </div>
    </div>

    <header class="p-6 border-b border-white/5 bg-black/20 flex justify-between items-center">
        <h1 class="text-xl font-black italic uppercase tracking-tighter text-blue-500">Amana <span class="text-white">Master</span></h1>
        <button id="logoutBtn" class="text-[10px] font-black uppercase bg-red-500/10 text-red-500 px-4 py-2 rounded-lg active:scale-95 transition">Logout</button>
    </header>

    <main class="p-6 space-y-8 max-w-4xl mx-auto">
        <section class="admin-card p-6 rounded-[2.5rem]">
            <h2 class="text-[10px] font-black uppercase mb-4 text-gray-500 tracking-widest">User Search Engine</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="userSearchInput" placeholder="Enter User UID..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition">
                <button id="searchBtn" class="bg-blue-600 px-6 rounded-xl font-black uppercase text-[10px] active:scale-95 transition">Search</button>
            </div>

            <div id="searchResult" class="hidden p-6 border border-white/5 rounded-[2rem] bg-white/5">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 id="resName" class="text-xl font-black italic">---</h3>
                        <p id="resUID" class="text-[9px] text-gray-500 font-mono mt-1">---</p>
                    </div>
                    <div class="text-right">
                        <p id="resBalance" class="text-2xl font-black text-blue-500">$0.00</p>
                        <p id="resStatus" class="text-[9px] font-bold uppercase mt-1">Status: Active</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="adjustBalance(100)" class="py-4 bg-blue-600/10 hover:bg-blue-600/20 rounded-2xl text-[10px] font-black uppercase transition border border-blue-500/20">Add $100</button>
                    <button onclick="adjustBalance(-100)" class="py-4 bg-orange-600/10 hover:bg-orange-600/20 rounded-2xl text-[10px] font-black uppercase transition border border-orange-500/20">Subtract $100</button>
                    <button id="banUserBtn" class="col-span-2 py-4 bg-red-500/10 text-red-500 rounded-2xl text-[10px] font-black uppercase border border-red-500/20 active:scale-95 transition">Ban User From System</button>
                </div>
            </div>
        </section>

        <section>
            <div class="flex gap-6 mb-4 px-2">
                <button onclick="loadRequests('deposits')" id="tabDep" class="tab-btn active text-[10px] font-black uppercase py-2 transition tracking-widest">Deposits</button>
                <button onclick="loadRequests('withdrawals')" id="tabWith" class="tab-btn text-[10px] font-black uppercase py-2 transition tracking-widest opacity-40">Withdrawals</button>
            </div>

            <div class="admin-card rounded-[2.5rem] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[9px] uppercase text-gray-500 font-black">
                        <tr>
                            <th class="p-5">User ID</th>
                            <th class="p-5">Amount</th>
                            <th class="p-5">Action</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody" class="text-xs font-bold divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "123adminvic321@admin.com";
        let currentUID = null;

        // التحقق من هوية الأدمن عند الدخول
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('authOverlay').classList.add('hidden');
                loadRequests('deposits');
            } else {
                alert("Restricted Access!");
                window.location.href = "login.html";
            }
        });

        // البحث عن مستخدم
        document.getElementById('searchBtn').onclick = async () => {
            const uid = document.getElementById('userSearchInput').value.trim();
            if(!uid) return;
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()){
                const d = snap.data();
                currentUID = uid;
                document.getElementById('searchResult').classList.remove('hidden');
                document.getElementById('resName').innerText = d.fullName;
                document.getElementById('resUID').innerText = "UID: " + uid;
                document.getElementById('resBalance').innerText = `$${parseFloat(d.balance || 0).toFixed(2)}`;
                document.getElementById('resStatus').innerText = d.isBanned ? "Status: Banned" : "Status: Active";
                document.getElementById('resStatus').className = `text-[9px] font-bold uppercase mt-1 ${d.isBanned ? 'text-red-500' : 'text-green-500'}`;
            } else { alert("User Not Found!"); }
        };

        // تعديل الرصيد
        window.adjustBalance = async (amount) => {
            if(!currentUID) return;
            const ref = doc(db, "users", currentUID);
            const snap = await getDoc(ref);
            const newBal = (snap.data().balance || 0) + amount;
            await updateDoc(ref, { balance: newBal });
            document.getElementById('resBalance').innerText = `$${newBal.toFixed(2)}`;
        };

        // حظر المستخدم
        document.getElementById('banUserBtn').onclick = async () => {
            const ref = doc(db, "users", currentUID);
            const snap = await getDoc(ref);
            const isBanned = snap.data().isBanned || false;
            await updateDoc(ref, { isBanned: !isBanned });
            document.getElementById('searchBtn').click();
            alert(isBanned ? "User Unbanned!" : "User Banned!");
        };

        // جلب طلبات السحب والإيداع
        window.loadRequests = async (type) => {
            document.getElementById('tabDep').classList.toggle('active', type === 'deposits');
            document.getElementById('tabWith').classList.toggle('active', type === 'withdrawals');
            document.getElementById('tabDep').style.opacity = type === 'deposits' ? '1' : '0.4';
            document.getElementById('tabWith').style.opacity = type === 'withdrawals' ? '1' : '0.4';

            const snap = await getDocs(collection(db, type));
            const tbody = document.getElementById('requestTableBody');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td class="p-5 text-gray-400 font-mono">${d.id.substring(0,10)}..</td>
                        <td class="p-5 text-blue-500">$${data.amount}</td>
                        <td class="p-5">
                            ${data.status === 'pending' ? 
                            `<button onclick="processRequest('${type}','${d.id}','${data.userId}',${data.amount})" class="bg-blue-600 px-3 py-1 rounded text-[8px] uppercase">Approve</button>` : 
                            '<span class="text-gray-600">Completed</span>'}
                        </td>
                    </tr>`;
            });
        };

        // معالجة الطلب
        window.processRequest = async (type, reqId, uId, amount) => {
            if(!confirm("Approve this transaction?")) return;
            if(type === 'deposits') {
                const uRef = doc(db, "users", uId);
                const uSnap = await getDoc(uRef);
                await updateDoc(uRef, { balance: (uSnap.data().balance || 0) + amount });
            }
            await updateDoc(doc(db, type, reqId), { status: 'completed' });
            alert("Success!");
            loadRequests(type);
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
