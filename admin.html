<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel | VERTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #02040a; font-family: 'Inter', sans-serif; color: #e2e8f0; overflow-x: hidden; }
        .admin-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; opacity: 1; }
        #authOverlay { position: fixed; inset: 0; background: #02040a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="text-center w-full max-w-xs p-6">
            <h1 class="text-xl font-black italic uppercase text-blue-500 mb-6">Vertex <span class="text-white">Admin</span></h1>
            <div class="space-y-4">
                <input type="text" id="adminUser" placeholder="Admin Email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500">
                <input type="password" id="adminPass" placeholder="Access Key" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500">
                <button id="unlockBtn" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-xs">Unlock System</button>
            </div>
        </div>
    </div>

    <header class="p-6 border-b border-white/5 bg-black/20 flex justify-between items-center sticky top-0 z-50 backdrop-blur-xl">
        <h1 class="text-xl font-black italic uppercase tracking-tighter text-blue-500">Vertex <span class="text-white">Master</span></h1>
        <button onclick="location.reload()" class="text-[10px] font-black uppercase bg-red-500/10 text-red-500 px-4 py-2 rounded-lg">Lock Panel</button>
    </header>

    <main class="p-6 space-y-8 max-w-5xl mx-auto">
        
        <section class="admin-card p-6 rounded-[2.5rem]">
            <h2 class="text-[10px] font-black uppercase mb-4 text-gray-500 tracking-widest">Global Search (UID or Phone)</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="userSearchInput" placeholder="Enter Phone (e.g. +961...) or UID" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none">
                <button id="searchBtn" class="bg-blue-600 px-6 rounded-xl font-black uppercase text-[10px]">Search</button>
            </div>

            <div id="searchResult" class="hidden p-6 border border-blue-500/20 rounded-[2rem] bg-blue-500/5">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 id="resName" class="text-xl font-black italic text-white">---</h3>
                        <p id="resPhone" class="text-[10px] text-blue-400 font-bold mt-1">---</p>
                        <p id="resUID" class="text-[8px] text-gray-500 font-mono mt-1">---</p>
                    </div>
                    <div class="text-right">
                        <p id="resBalance" class="text-2xl font-black text-blue-500">$0.00</p>
                        <p id="resStatus" class="text-[9px] font-bold uppercase mt-1">Status: Active</p>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button id="addMoney" class="py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[9px] font-black uppercase transition border border-white/10">+ $100</button>
                    <button id="subMoney" class="py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[9px] font-black uppercase transition border border-white/10">- $100</button>
                    <button id="banBtn" class="py-3 bg-red-500/10 text-red-500 rounded-xl text-[9px] font-black uppercase border border-red-500/20 transition">Ban / Unban</button>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-[10px] font-black uppercase mb-4 px-2 text-gray-500 tracking-widest">Verified Users List</h2>
            <div class="admin-card rounded-[2.5rem] overflow-hidden">
                <div class="max-h-[400px] overflow-y-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-[9px] uppercase text-gray-500 font-black sticky top-0">
                            <tr>
                                <th class="p-5">User / Phone</th>
                                <th class="p-5">Balance</th>
                                <th class="p-5 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="userListBody" class="text-xs font-bold divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section>
            <div class="flex gap-6 mb-4 px-2">
                <button id="tabDep" class="tab-btn active text-[10px] font-black uppercase py-2 transition tracking-widest">Deposits</button>
                <button id="tabWith" class="tab-btn text-[10px] font-black uppercase py-2 transition tracking-widest opacity-40">Withdrawals</button>
            </div>
            <div class="admin-card rounded-[2.5rem] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[9px] uppercase text-gray-500 font-black">
                        <tr>
                            <th class="p-5">User ID</th>
                            <th class="p-5">Amount</th>
                            <th class="p-5">Action</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody" class="text-xs font-bold divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUID = null;

        // الدخول
        document.getElementById('unlockBtn').onclick = () => {
            if(document.getElementById('adminUser').value === "admin.com" && document.getElementById('adminPass').value === "admin123") {
                document.getElementById('authOverlay').style.display = 'none';
                loadAllUsers(); // جلب المستخدمين عند الدخول
                loadRequests('deposits');
            }
        };

        // 1. جلب كافة المستخدمين (بالتدريج)
        async function loadAllUsers() {
            const snap = await getDocs(collection(db, "users"));
            const tbody = document.getElementById('userListBody');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition">
                        <td class="p-5">
                            <div class="text-white">${u.fullName || 'No Name'}</div>
                            <div class="text-[9px] text-gray-500 font-mono">${u.phone || 'No Phone'}</div>
                        </td>
                        <td class="p-5 text-blue-500">$${parseFloat(u.balance || 0).toFixed(2)}</td>
                        <td class="p-5 text-right">
                            <button onclick="quickView('${d.id}')" class="text-[8px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg uppercase">Manage</button>
                        </td>
                    </tr>`;
            });
        }

        // 2. البحث (بالـ UID أو رقم الهاتف)
        document.getElementById('searchBtn').onclick = async () => {
            const input = document.getElementById('userSearchInput').value.trim();
            if(!input) return;

            let userDoc = null;

            // محاولة البحث بالـ UID أولاً
            const directSnap = await getDoc(doc(db, "users", input));
            if(directSnap.exists()) {
                userDoc = directSnap;
            } else {
                // البحث برقم الهاتف
                const q = query(collection(db, "users"), where("phone", "==", input));
                const qSnap = await getDocs(q);
                if(!qSnap.empty) userDoc = qSnap.docs[0];
            }

            if(userDoc) {
                showUserDetail(userDoc.id, userDoc.data());
            } else {
                alert("No user found with this UID or Phone number.");
            }
        };

        function showUserDetail(uid, d) {
            currentUID = uid;
            document.getElementById('searchResult').classList.remove('hidden');
            document.getElementById('resName').innerText = d.fullName;
            document.getElementById('resPhone').innerText = "Phone: " + (d.phone || 'N/A');
            document.getElementById('resUID').innerText = "UID: " + uid;
            document.getElementById('resBalance').innerText = `$${parseFloat(d.balance || 0).toFixed(2)}`;
            document.getElementById('resStatus').innerText = d.isBanned ? "Status: Banned" : "Status: Active";
            document.getElementById('resStatus').className = `text-[9px] font-bold uppercase mt-1 ${d.isBanned ? 'text-red-500' : 'text-green-500'}`;
        }

        window.quickView = async (uid) => {
            const snap = await getDoc(doc(db, "users", uid));
            showUserDetail(uid, snap.data());
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // تعديل الرصيد والحظر (نفس المنطق السابق)
        const updateBalance = async (amt) => {
            if(!currentUID) return;
            const ref = doc(db, "users", currentUID);
            const snap = await getDoc(ref);
            const newB = (snap.data().balance || 0) + amt;
            await updateDoc(ref, { balance: newB });
            document.getElementById('resBalance').innerText = `$${newB.toFixed(2)}`;
            loadAllUsers(); // تحديث القائمة العامة
        };

        document.getElementById('addMoney').onclick = () => updateBalance(100);
        document.getElementById('subMoney').onclick = () => updateBalance(-100);
        document.getElementById('banBtn').onclick = async () => {
            const ref = doc(db, "users", currentUID);
            const snap = await getDoc(ref);
            await updateDoc(ref, { isBanned: !snap.data().isBanned });
            quickView(currentUID);
        };

        // الطلبات (Deposits/Withdrawals)
        async function loadRequests(type) {
            document.getElementById('tabDep').classList.toggle('active', type === 'deposits');
            document.getElementById('tabWith').classList.toggle('active', type === 'withdrawals');
            const snap = await getDocs(collection(db, type));
            const tbody = document.getElementById('requestTableBody');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td class="p-5 text-gray-400 font-mono">${d.id.substring(0,8)}..</td>
                        <td class="p-5 text-blue-500">$${data.amount}</td>
                        <td class="p-5">
                            ${data.status === 'pending' ? 
                            `<button onclick="approveReq('${type}','${d.id}','${data.userId}',${data.amount})" class="bg-blue-600 px-3 py-1 rounded text-[8px]">Approve</button>` : 
                            '<span class="text-gray-600 text-[8px]">Done</span>'}
                        </td>
                    </tr>`;
            });
        }

        window.approveReq = async (type, rid, uid, amt) => {
            if(type === 'deposits') {
                const uref = doc(db, "users", uid);
                const usnap = await getDoc(uref);
                await updateDoc(uref, { balance: (usnap.data().balance || 0) + amt });
            }
            await updateDoc(doc(db, type, rid), { status: 'completed' });
            loadRequests(type);
            loadAllUsers();
        };

        document.getElementById('tabDep').onclick = () => loadRequests('deposits');
        document.getElementById('tabWith').onclick = () => loadRequests('withdrawals');

    </script>
</body>
</html>
