<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invest | VERTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #050810; --primary: #3b82f6; --nav-bg: rgba(10, 15, 28, 0.95); }
        body { background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow-x: hidden; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-border { border: 1px solid; border-image: linear-gradient(to right, #3b82f6, #8b5cf6) 1; }
        
        /* Bottom Nav Styles */
        .bottom-nav { background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.08); height: 80px; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; padding-bottom: 10px; }
        .invest-fab { width: 65px; height: 65px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; top: -25px; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); border: 5px solid var(--bg-dark); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--primary); }

        .contract-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .contract-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-32">

    <header class="px-6 pt-12 pb-6">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">Mining Nodes</h1>
        <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.3em]">Select Protocol Efficiency</p>
    </header>

    <div class="px-6 mb-8">
        <div class="glass-card p-4 rounded-3xl flex justify-between items-center border-l-4 border-l-blue-500">
            <div>
                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Available Capital</p>
                <p id="userBalance" class="text-xl font-black text-white">$0.00</p>
            </div>
            <i class="fas fa-wallet text-blue-500/50 text-xl"></i>
        </div>
    </div>

    <main class="px-6 space-y-4" id="contractsContainer">
        <div class="glass-card rounded-[2.5rem] p-6 relative overflow-hidden">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="px-3 py-1 bg-blue-500/10 text-blue-400 text-[8px] font-black uppercase rounded-full border border-blue-500/20">Alpha Node</span>
                    <h3 class="text-xl font-black mt-2 italic">LITE CORE</h3>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-500 font-bold">DAILY YIELD</p>
                    <p class="text-lg font-black text-emerald-400">5.0%</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white/5 rounded-2xl p-3">
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Min Entry</p>
                    <p class="text-sm font-black text-white">$10.00</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-3">
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Duration</p>
                    <p class="text-sm font-black text-white">24 Hours</p>
                </div>
            </div>
            <button onclick="activateContract(10, 0.05, 'LITE CORE')" class="contract-btn w-full py-4 bg-blue-600 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-blue-600/20">Activate Node</button>
        </div>

        <div class="glass-card rounded-[2.5rem] p-6 relative border-t-2 border-t-purple-500/30">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="px-3 py-1 bg-purple-500/10 text-purple-400 text-[8px] font-black uppercase rounded-full border border-purple-500/20">Beta Node</span>
                    <h3 class="text-xl font-black mt-2 italic">ULTRA CORE</h3>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-500 font-bold">DAILY YIELD</p>
                    <p class="text-lg font-black text-emerald-400">8.5%</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white/5 rounded-2xl p-3">
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Min Entry</p>
                    <p class="text-sm font-black text-white">$50.00</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-3">
                    <p class="text-[8px] text-gray-500 font-bold uppercase">Duration</p>
                    <p class="text-sm font-black text-white">48 Hours</p>
                </div>
            </div>
            <button onclick="activateContract(50, 0.085, 'ULTRA CORE')" class="contract-btn w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-purple-600/20">Activate Node</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center"><a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a></div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentBalance = 0;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userRef);
                if (docSnap.exists()) {
                    currentBalance = docSnap.data().balance || 0;
                    document.getElementById('userBalance').innerText = `$${parseFloat(currentBalance).toLocaleString()}`;
                }
            } else {
                window.location.replace("login.html");
            }
        });

        window.activateContract = async (amount, yieldPercent, name) => {
            if (!currentUser) return;

            if (currentBalance < amount) {
                alert("Insufficient Protocol Balance. Please Top Up.");
                return;
            }

            if (confirm(`Initiate ${name} for $${amount}?`)) {
                try {
                    const userRef = doc(db, "users", currentUser.uid);
                    await updateDoc(userRef, {
                        balance: increment(-amount)
                    });
                    
                    alert(`Node ${name} Activated Successfully!`);
                    location.reload(); // تحديث الرصيد المعروض
                } catch (e) {
                    alert("System Error: " + e.message);
                }
            }
        };
    </script>
</body>
</html>
