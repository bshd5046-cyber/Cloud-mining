<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex | Alpha Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #3b82f6; --accent: #60a5fa; }
        body { 
            background: #02040a; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* خلفية أسطورية متحركة (Mesh Gradient) */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #02040a, #050b18, #02040a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* جزيئات ضوئية عشوائية في الخلفية */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 80%);
        }

        /* تأثير الاسم اللماع (Glowing Text) */
        .glossy-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 20%, #3b82f6 50%, #1e3a8a 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));
            animation: textShine 3s ease-in-out infinite alternate;
        }

        @keyframes textShine {
            from { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3)); transform: translateY(0); }
            to { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.7)); transform: translateY(-5px); }
        }

        /* حاوية المدخلات الزجاجية */
        .ultra-glass {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .cyber-input {
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s;
        }

        .cyber-input:focus-within {
            border-bottom-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        /* زر Login الأسطوري */
        .btn-glow {
            background: #fff;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 0 0px rgba(255, 255, 255, 0);
        }

        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles"></div>

    <div class="w-full max-w-[440px] p-8 relative z-10 animate-fade-in">
        
        <div class="text-center mb-12">
            <h1 class="glossy-title">VERTEX</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-[0.5em] mt-2 opacity-70">Quantum Infrastructure</p>
        </div>

        <div class="ultra-glass p-10 md:p-12">
            <div class="space-y-6">
                <div class="cyber-input py-3 flex items-center">
                    <i class="fa-thin fa-user text-blue-500/50 mr-4"></i>
                    <input type="email" id="loginEmail" placeholder="EMAIL" class="bg-transparent border-none outline-none w-full text-xs font-bold tracking-widest placeholder:text-gray-700">
                </div>

                <div class="cyber-input py-3 flex items-center">
                    <i class="fa-thin fa-lock-keyhole text-blue-500/50 mr-4"></i>
                    <input type="password" id="loginPassword" placeholder="PASSWORD" class="bg-transparent border-none outline-none w-full text-xs font-bold tracking-widest placeholder:text-gray-700">
                </div>

                <button id="loginBtn" class="btn-glow w-full py-5 rounded-xl text-[11px] mt-8 active:scale-95">
                    Login
                </button>
            </div>

            <p id="loginMessage" class="text-center mt-6 text-[9px] font-black uppercase tracking-widest h-4"></p>

            <div class="mt-10 text-center">
                <a href="signup.html" class="text-gray-600 text-[10px] font-black uppercase tracking-[0.3em] hover:text-white transition-all">
                    Create Account
                </a>
            </div>
        </div>

        <p class="text-center mt-12 text-gray-800 text-[9px] font-bold tracking-[0.4em]">SYSTEM v4.0.2</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');

            if(!email || !password) {
                msg.style.color = "#f87171";
                msg.innerText = "ACCESS DENIED: EMPTY FIELDS";
                return;
            }

            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.style.color = "#4ade80";
                msg.innerText = "CONNECTION ESTABLISHED";
                setTimeout(() => window.location.href = "index.html", 800);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Login";
                msg.style.color = "#f87171";
                msg.innerText = "AUTHENTICATION FAILED";
            }
        });
    </script>
</body>
</html>
