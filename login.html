<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | VERTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #3b82f6; --bg: #020617; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* خلفية متدرجة تندمج مع لون الشعار */
        .hero-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% 40%, rgba(59, 130, 246, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 0% 0%, rgba(30, 58, 138, 0.1) 0%, transparent 40%),
                #020617;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .input-style {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s all ease;
        }

        .input-style:focus-within {
            border-color: var(--brand);
            background: rgba(59, 130, 246, 0.03);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .login-btn {
            background: #ffffff;
            color: #000000;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-btn:active { transform: scale(0.95); }

        /* نبض هادئ خلف الشعار */
        .logo-aura {
            position: absolute;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            z-index: -1;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>

    <div class="relative z-10 w-full flex justify-center p-6">
        <div class="glass-box text-center">
            
            <div class="relative flex flex-col items-center mb-10">
                <div class="logo-aura"></div>
                <img src="logo.png" alt="Logo" class="w-28 h-28 object-contain mb-4 drop-shadow-2xl">
                <h2 class="text-2xl font-extrabold tracking-tighter text-white uppercase">VERTEX</h2>
            </div>

            <div class="space-y-4 mb-8">
                <div class="input-style rounded-2xl flex items-center px-4 py-4">
                    <i class="fas fa-envelope text-gray-500 mr-3 text-sm"></i>
                    <input type="email" id="loginEmail" placeholder="Email" class="bg-transparent border-none outline-none w-full text-sm font-semibold placeholder:text-gray-600">
                </div>

                <div class="input-style rounded-2xl flex items-center px-4 py-4">
                    <i class="fas fa-lock text-gray-500 mr-3 text-sm"></i>
                    <input type="password" id="loginPassword" placeholder="Password" class="bg-transparent border-none outline-none w-full text-sm font-semibold placeholder:text-gray-600">
                </div>
            </div>

            <button id="loginBtn" class="login-btn w-full py-4 rounded-2xl font-black uppercase tracking-[0.2em] text-xs shadow-xl mb-6">
                Login
            </button>

            <div id="loginMessage" class="text-[10px] font-bold uppercase tracking-wider h-4 mb-4"></div>

            <a href="signup.html" class="text-gray-500 text-[10px] font-black uppercase tracking-[0.2em] hover:text-blue-500 transition">
                Create Account
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');

            if(!email || !password) {
                msg.style.color = "#f87171";
                msg.innerText = "Empty Credentials";
                return;
            }

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.style.color = "#4ade80";
                msg.innerText = "Success";
                setTimeout(() => window.location.href = "index.html", 800);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Login";
                msg.style.color = "#f87171";
                msg.innerText = "Failed";
            }
        });
    </script>
</body>
</html>
