<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | VERTEX Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #3b82f6; --bg: #01040a; --glass: rgba(255, 255, 255, 0.015); }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* خلفية الشبكة الإلكترونية والتدريج اللوني السينمائي */
        .hero-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmZmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMyI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
        }

        /* حاوية زجاجية فخمة مع إطار نيون دقيق */
        .glass-box {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            box-shadow: 
                0 0 50px rgba(0, 0, 0, 0.7),
                inset 0 0 2px rgba(59, 130, 246, 0.3);
            position: relative;
        }

        /* تأثير النيون الخفي حول الحاوية */
        .glass-box::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 37px;
            z-index: -1;
            background: linear-gradient(135deg, transparent, rgba(59, 130, 246, 0.2), transparent, rgba(59, 130, 246, 0.1), transparent);
        }

        /* مجموعة المدخلات بتأثير النبض البصري */
        .input-group {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group:focus-within {
            border-color: rgba(59, 130, 246, 0.6);
            background: rgba(59, 130, 246, 0.02);
            transform: scale(1.01);
            box-shadow: 0 4px 30px rgba(59, 130, 246, 0.15);
        }

        /* زر تسجيل الدخول الفاخر والمشتعل */
        .login-btn {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            box-shadow: 0 15px 35px -5px rgba(59, 130, 246, 0.5);
            transition: 0.3s all;
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .login-btn:hover::after { left: 100%; }
        .login-btn:active { transform: scale(0.97); }

        /* توهج خلف الشعار (Pulse) */
        .logo-glow-pulse {
            position: absolute;
            width: 150px; h-150px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.8;
            animation: pulse-glow 2.5s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.9; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>

    <div class="w-full max-w-[420px] p-6 animate-fade-in relative z-10">
        <div class="glass-box p-10 md:p-12 relative overflow-hidden">
            
            <div class="text-center mb-12 relative flex flex-col items-center">
                <div class="logo-glow-pulse -top-6"></div>
                <img src="logo.png" alt="Logo" class="w-20 h-20 mb-5 relative object-contain">
                <h1 class="text-2xl font-black italic tracking-tighter text-white uppercase relative">Vertex <span class="text-blue-500">Cloud</span></h1>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-1 relative">Access Protocol <span class="text-gray-700">|</span> Encrypted</p>
            </div>

            <div class="space-y-4">
                <div class="input-group rounded-2xl flex items-center p-4">
                    <i class="fas fa-fingerprint text-blue-500/60 mr-4 text-base"></i>
                    <input type="email" id="loginEmail" placeholder="Authorized Email Address" class="bg-transparent border-none outline-none w-full text-sm font-medium text-white placeholder:text-gray-600 focus:ring-0">
                </div>

                <div class="input-group rounded-2xl flex items-center p-4">
                    <i class="fas fa-shield-halved text-blue-500/60 mr-4 text-base"></i>
                    <input type="password" id="loginPassword" placeholder="Secure Operator Password" class="bg-transparent border-none outline-none w-full text-sm font-medium text-white placeholder:text-gray-600 focus:ring-0">
                </div>

                <button id="loginBtn" class="login-btn text-white w-full py-5 rounded-2xl font-black uppercase tracking-widest text-[11px] mt-8 group">
                    <i class="fas fa-key-skeleton mr-2 group-hover:rotate-45 transition"></i> Authenticate Access
                </button>
            </div>

            <p id="loginMessage" class="text-center mt-5 text-[10px] font-black uppercase tracking-wider h-4"></p>

            <div class="mt-8 pt-7 border-t border-white/5 text-center">
                <p class="text-gray-600 text-[10px] font-bold uppercase tracking-tight">
                    New Operator? 
                    <a href="signup.html" class="text-blue-500 ml-1 hover:underline">Establish Secure Account</a>
                </p>
            </div>
        </div>
        
        <p class="text-center mt-9 text-gray-700 text-[9px] font-bold uppercase tracking-[0.25em]">
            © 2026 VERTEX SECURITY INFRASTRUCTURE
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');

            if(!email || !password) {
                msg.style.color = "#f87171";
                msg.innerText = "Credentials Required";
                return;
            }

            btn.innerHTML = '<i class="fas fa-satellite animate-pulse mr-2"></i> Initializing...';
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.style.color = "#4ade80";
                msg.innerHTML = '<i class="fas fa-satellite-dish mr-2"></i> Identity Confirmed. Establishing Link.';
                setTimeout(() => window.location.href = "index.html", 800);
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key-skeleton mr-2"></i> Authenticate Access';
                msg.style.color = "#f87171";
                
                if (error.code === 'auth/invalid-credential') msg.innerText = "Access Denied: Identity Mismatch";
                else msg.innerText = "System Failure during Authentication";
            }
        });
    </script>
</body>
</html>
