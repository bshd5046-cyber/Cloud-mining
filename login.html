<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | AMANA Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050810; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .input-field:focus-within {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase text-blue-500">Welcome <span class="text-white">Back</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-2">Secure biometric access</p>
        </div>

        <div class="space-y-4">
            <div class="input-field rounded-2xl flex items-center p-4">
                <i class="fas fa-at text-gray-500 mr-4"></i>
                <input type="email" id="loginEmail" placeholder="Email Address" class="bg-transparent border-none outline-none w-full text-sm font-medium">
            </div>

            <div class="input-field rounded-2xl flex items-center p-4">
                <i class="fas fa-shield-alt text-gray-500 mr-4"></i>
                <input type="password" id="loginPassword" placeholder="Password" class="bg-transparent border-none outline-none w-full text-sm font-medium">
            </div>

            <button id="loginBtn" class="bg-white text-black w-full py-5 rounded-2xl font-black uppercase tracking-widest text-sm mt-4 active:scale-95 transition">
                Authorize Login
            </button>
        </div>

        <p id="loginMessage" class="text-center mt-4 text-xs font-bold uppercase"></p>

        <p class="text-center mt-8 text-gray-500 text-xs font-bold uppercase">
            New to Amana? 
            <a href="signup.html" class="text-blue-500 ml-1">Create Account</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // وظيفة تسجيل الدخول
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMessage');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.style.color = "#4ade80";
                msg.innerText = "Login Successful! Redirecting...";
                // التوجه إلى الصفحة الرئيسية بعد ثانية واحدة
                setTimeout(() => window.location.href = "index.html", 1000);
            } catch (error) {
                msg.style.color = "#f87171";
                // عرض رسالة خطأ بسيطة للمستخدم
                if (error.code === 'auth/user-not-found') msg.innerText = "User not found";
                else if (error.code === 'auth/wrong-password') msg.innerText = "Incorrect password";
                else msg.innerText = "Login failed. Please try again.";
            }
        });
    </script>
</body>
</html>
