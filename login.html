<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | AMANA Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050810; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .input-field:focus-within {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase text-blue-500">Welcome <span class="text-white">Back</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-2">Secure biometric access</p>
        </div>

        <div class="space-y-4">
            <div class="input-field rounded-2xl flex items-center p-4">
                <i class="fas fa-at text-gray-500 mr-4"></i>
                <input type="email" placeholder="Email or Username" class="bg-transparent border-none outline-none w-full text-sm font-medium">
            </div>

            <div class="input-field rounded-2xl flex items-center p-4">
                <i class="fas fa-shield-alt text-gray-500 mr-4"></i>
                <input type="password" placeholder="Password" class="bg-transparent border-none outline-none w-full text-sm font-medium">
            </div>

            <div class="text-right px-2">
                <a href="#" class="text-[10px] text-gray-500 font-bold uppercase hover:text-blue-500">Forgot Password?</a>
            </div>

            <button onclick="window.location.href='index.html'" class="bg-white text-black w-full py-5 rounded-2xl font-black uppercase tracking-widest text-sm mt-4 active:scale-95 transition">
                Authorize Login
            </button>

            <div class="flex items-center gap-4 my-6">
                <div class="h-[1px] bg-white/10 flex-1"></div>
                <span class="text-[10px] text-gray-600 font-black uppercase">Or</span>
                <div class="h-[1px] bg-white/10 flex-1"></div>
            </div>

            <button class="w-full border border-white/10 py-4 rounded-2xl flex items-center justify-center gap-3 text-sm font-bold active:bg-white/5 transition">
                <i class="fab fa-google"></i>
                Google Access
            </button>
        </div>

        <p class="text-center mt-8 text-gray-500 text-xs font-bold uppercase">
            New to Amana? 
            <a href="signup.html" class="text-blue-500 ml-1">Create Account</a>
        </p>
    </div>

</body>
</html>
