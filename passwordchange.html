<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Reset | VERTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050810; --primary: #3b82f6; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); width: 90%; max-width: 400px; padding: 2rem; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-group input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.2rem; padding: 1rem 1.2rem; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; padding: 1rem; border-radius: 1.2rem; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .success-state { display: none; }
    </style>
</head>
<body>

    <div class="glass-card text-center" id="mainContainer" style="display: none;">
        <div class="mb-8">
            <div class="w-16 h-16 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                <i class="fas fa-shield-check text-2xl text-blue-500"></i>
            </div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Vertex <span class="text-blue-500">Security</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mt-1">Authorized Access Only</p>
        </div>

        <div id="formState" class="space-y-5">
            <div class="input-group text-left">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-4 mb-2 block">New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <div class="input-group text-left">
                <label class="text-[10px] font-black text-gray-500 uppercase ml-4 mb-2 block">Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button onclick="handleReset()" id="resetBtn" class="btn-primary mt-4">Update Password</button>
        </div>

        <div id="successState" class="success-state space-y-6">
            <div class="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto text-emerald-500 border border-emerald-500/20">
                <i class="fas fa-check text-2xl"></i>
            </div>
            <h3 class="font-black uppercase italic text-emerald-500">Access Granted!</h3>
            <p class="text-[11px] text-gray-500 mt-2 leading-relaxed">Your password has been securely updated. You can now log in to your dashboard.</p>
            <a href="login.html" class="block w-full py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase border border-white/5">Back to Login</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');

        // الحماية: التحقق من الرابط فوراً
        window.addEventListener('DOMContentLoaded', async () => {
            if (!actionCode) {
                alert("Unauthorized Access. No security token found.");
                window.location.replace("login.html");
                return;
            }
            try {
                await verifyPasswordResetCode(auth, actionCode);
                document.getElementById('mainContainer').style.display = 'block';
            } catch (error) {
                alert("This security link is invalid or has expired.");
                window.location.replace("login.html");
            }
        });

        window.handleReset = async () => {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            if (newPass.length < 8) return alert("Security standard: Password must be 8+ characters.");
            if (newPass !== confirmPass) return alert("Passwords do not match.");

            try {
                btn.innerText = "UPDATING...";
                btn.disabled = true;
                await confirmPasswordReset(auth, actionCode, newPass);
                document.getElementById('formState').style.display = 'none';
                document.getElementById('successState').style.display = 'block';
            } catch (error) {
                alert("Failed to update. The link may have expired.");
                btn.disabled = false;
                btn.innerText = "Update Password";
            }
        };
    </script>
</body>
</html>
