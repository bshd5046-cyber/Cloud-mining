<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Active Mining | AMANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #06b6d4;
            --bg-dark: #050810;
            --nav-bg: rgba(10, 15, 28, 0.95);
        }
        body { 
            background-color: var(--bg-dark); 
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* أنيميشن التعدين */
        .mining-circle {
            width: 210px; height: 210px;
            border-radius: 50%;
            border: 4px solid rgba(59, 130, 246, 0.1);
            position: relative;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
        }
        .mining-active-border {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 4px solid transparent;
            border-top-color: var(--primary);
            border-right-color: var(--accent);
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .bolt-glow {
            font-size: 55px; color: var(--primary);
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.8);
        }

        /* البار السفلي الموحد - مطابق لأسماء ملفاتك */
        .bottom-nav {
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            height: 75px; position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        
        .invest-fab {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: absolute; top: -32px; left: 50%; transform: translateX(-50%);
            border: 6px solid var(--bg-dark);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }
        .nav-item span { font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }

        .console-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            color: #636e72;
            height: 80px;
            overflow: hidden;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="px-6 pt-10 flex justify-between items-center">
        <div>
            <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Active Node</p>
            <h1 class="text-xl font-black italic text-white">FALCON-TRD-01</h1>
        </div>
        <div class="flex items-center gap-2 px-3 py-1 bg-green-500/10 rounded-full border border-green-500/20">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] text-green-400 font-bold uppercase">Mining</span>
        </div>
    </div>

    <div class="flex-1 flex flex-col justify-center px-6">
        <div class="mining-circle mb-8">
            <div id="loadingRing" class="mining-active-border"></div>
            <div class="text-center z-10">
                <i class="fas fa-bolt-lightning bolt-glow mb-2"></i>
                <p class="text-[10px] font-black text-blue-400 tracking-widest">DECRYPTING...</p>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-7 text-center">
            <p class="text-gray-500 text-[10px] mb-1 uppercase font-black">Next Reward In</p>
            <h2 id="timer" class="text-4xl font-black text-white font-mono mb-6">23:59:59</h2>
            
            <div class="flex justify-between border-t border-white/5 pt-6">
                <div class="text-left">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Today</p>
                    <p class="text-xl font-black text-green-400">+$2.50</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Balance</p>
                    <p class="text-xl font-black text-white">$145.80</p>
                </div>
            </div>

            <button onclick="startMining()" id="mainBtn" class="w-full mt-8 bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase active:scale-95 transition shadow-lg shadow-blue-600/20">
                Collect Dividends
            </button>
        </div>
    </div>

    <div class="px-6 mb-32">
        <div class="console-box">
            <p class="text-blue-500">> Secure Handshake: OK</p>
            <p class="text-yellow-500">> Verifying block SHA-256...</p>
            <p class="text-green-500">> Network difficulty accepted.</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-house"></i>
            <span>Home</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>

        <div class="relative flex-1 flex justify-center">
            <a href="invest.html" class="invest-fab">
                <i class="fas fa-bolt-lightning text-2xl text-white"></i>
            </a>
            <span class="absolute bottom-[-18px] text-[10px] font-black text-blue-500 uppercase">Invest</span>
        </div>

        <a href="support.html" class="nav-item">
            <i class="fas fa-headset"></i>
            <span>Support</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-circle-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script>
        function startTimer(duration, display) {
            var timer = duration, hours, minutes, seconds;
            setInterval(function () {
                hours = Math.floor(timer / 3600);
                minutes = Math.floor((timer % 3600) / 60);
                seconds = Math.floor(timer % 60);
                display.textContent = (hours < 10 ? "0" + hours : hours) + ":" + 
                                      (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                                      (seconds < 10 ? "0" + seconds : seconds);
                if (--timer < 0) timer = duration;
            }, 1000);
        }
        window.onload = function () { startTimer(86399, document.querySelector('#timer')); };

        function startMining() {
            const btn = document.getElementById('mainBtn');
            btn.innerHTML = "PROCESSING...";
            btn.disabled = true;
            setTimeout(() => {
                alert("Profits collected successfully!");
                btn.innerHTML = "COLLECTED";
                btn.style.opacity = "0.5";
            }, 1500);
        }
    </script>
</body>
</html>
