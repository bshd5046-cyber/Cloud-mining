<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | VERTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #050810; --primary: #3b82f6; --nav-bg: rgba(10, 15, 28, 0.95); }
        body { background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow-x: hidden; }
        #mainProfile { display: none; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Bottom Nav */
        .bottom-nav { background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.08); height: 80px; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; padding-bottom: 10px; }
        .invest-fab { width: 65px; height: 65px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; top: -25px; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); border: 5px solid var(--bg-dark); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body class="pb-28">

    <main id="mainProfile">
        <div class="px-6 pt-12 pb-8 text-center bg-gradient-to-b from-blue-900/10 to-transparent">
            <div class="w-20 h-20 rounded-full border-2 border-blue-500 p-1 mx-auto mb-3 overflow-hidden">
                <img id="userAvatar" src="" class="w-full h-full rounded-full object-cover">
            </div>
            <h2 id="userName" class="text-xl font-bold uppercase tracking-tight">Loading...</h2>
            <p id="userEmailDisplay" class="text-gray-500 text-xs mt-1">---</p>
        </div>

        <div class="grid grid-cols-2 gap-4 px-6 mb-8">
            <div class="glass-card p-4 rounded-2xl">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Total Balance</p>
                <p id="userBalance" class="text-lg font-black text-white">$0.00</p>
            </div>
            <div class="glass-card p-4 rounded-2xl">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">My ID</p>
                <p id="userInviteCode" class="text-lg font-black text-blue-400">-----</p>
            </div>
        </div>

        <div class="px-6 space-y-3">
            
            <a href="invite.html" class="glass-card flex items-center justify-between p-5 rounded-2xl active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-500">
                        <i class="fas fa-users text-lg"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold">Invite Friends</p>
                        <p class="text-[10px] text-gray-500">Earn up to 34% commission</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-xs text-gray-600"></i>
            </a>

            <button onclick="requestPasswordReset()" class="w-full glass-card flex items-center justify-between p-5 rounded-2xl active:scale-95 transition-transform text-left">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-gray-500/10 flex items-center justify-center text-gray-400">
                        <i class="fas fa-lock text-lg"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold">Change Password</p>
                        <p class="text-[10px] text-gray-500">Receive reset link via email</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-xs text-gray-600"></i>
            </button>

            <button id="logoutBtn" class="w-full glass-card flex items-center gap-4 p-5 rounded-2xl active:bg-red-500/10 text-red-500 transition-colors text-left">
                <div class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center">
                    <i class="fas fa-sign-out-alt text-lg"></i>
                </div>
                <p class="text-sm font-bold">Logout</p>
            </button>

        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center"><a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a></div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // وظيفة تغيير كلمة السر البسيطة
        window.requestPasswordReset = async () => {
            const email = auth.currentUser.email;
            if (confirm("Send password reset link to: " + email + "?")) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert("Reset link sent! Please check your email.");
                } catch (e) {
                    alert("Error: " + e.message);
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('mainProfile').style.display = 'block';
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById('userName').innerText = d.fullName;
                    document.getElementById('userBalance').innerText = `$${parseFloat(d.balance || 0).toLocaleString()}`;
                    document.getElementById('userEmailDisplay').innerText = user.email;
                    document.getElementById('userInviteCode').innerText = d.myReferralCode || user.uid.substring(0, 5).toUpperCase();
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${d.fullName}&background=2563eb&color=fff&bold=true`;
                }
            } else {
                window.location.replace("login.html");
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm("Are you sure you want to logout?")) {
                signOut(auth).then(() => window.location.replace("login.html"));
            }
        });
    </script>
</body>
</html>
