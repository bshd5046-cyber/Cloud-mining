<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | AMANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #050810; --primary: #3b82f6; --nav-bg: rgba(10, 15, 28, 0.95); }
        body { background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow: hidden; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* قسم الأمان الداخلي */
        #securitySection {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 250; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        #securitySection.open { right: 0; }

        .input-dark { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.2rem; padding: 1rem; width: 100%; outline: none; transition: 0.3s; font-size: 14px; }
        .input-dark:focus { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }

        .bottom-nav { background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.08); height: 75px; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .invest-fab { width: 68px; height: 68px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: -32px; left: 50%; transform: translateX(-50%); border: 6px solid var(--bg-dark); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; font-size: 10px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <main id="mainProfile" class="h-screen overflow-y-auto pb-32">
        <div class="px-6 pt-12 pb-8 text-center bg-gradient-to-b from-blue-900/20 to-transparent">
            <div class="w-24 h-24 rounded-full border-2 border-blue-500/50 p-1 mx-auto mb-4">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" class="w-full h-full rounded-full object-cover">
            </div>
            <h2 id="userName" class="text-2xl font-black italic">Loading...</h2>
            <p id="userEmail" class="text-gray-500 text-xs mt-1">---</p>
        </div>

        <div class="grid grid-cols-2 gap-4 px-6 mb-8">
            <div class="glass-card p-5 rounded-[2rem]">
                <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Balance</p>
                <p id="userBalance" class="text-xl font-black text-white">$0.00</p>
            </div>
            <div class="glass-card p-5 rounded-[2rem]">
                <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Phone</p>
                <p id="userPhone" class="text-xs font-bold text-blue-400">---</p>
            </div>
        </div>

        <div class="px-6 space-y-4">
            <div class="glass-card rounded-[2.5rem] overflow-hidden divide-y divide-white/5">
                <button onclick="toggleSecurity(true)" class="w-full flex items-center justify-between p-6 active:bg-white/5 transition text-left">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500"><i class="fas fa-shield-halved"></i></div>
                        <div>
                            <p class="text-sm font-bold">Security Settings</p>
                            <p class="text-[9px] text-gray-500 uppercase">Change Password & Email</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-xs text-gray-700"></i>
                </button>

                <button id="logoutBtn" class="w-full flex items-center gap-4 p-6 active:bg-red-500/10 transition group">
                    <div class="w-11 h-11 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500"><i class="fas fa-power-off"></i></div>
                    <span class="text-sm font-bold text-red-500">Logout</span>
                </button>
            </div>
        </div>
    </main>

    <section id="securitySection" class="p-6">
        <div class="flex items-center gap-4 mb-8 pt-6">
            <button onclick="toggleSecurity(false)" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                <i class="fas fa-arrow-left text-sm"></i>
            </button>
            <h2 class="text-xl font-black italic uppercase">Security</h2>
        </div>

        <div class="space-y-6">
            <div class="glass-card p-6 rounded-[2rem] space-y-4">
                <h4 class="text-blue-500 font-black text-xs uppercase italic">Change Password</h4>
                <input type="password" id="newPass" placeholder="New Password" class="input-dark">
                <input type="password" id="confirmPass" placeholder="Confirm New Password" class="input-dark">
                
                <div class="flex gap-2">
                    <input type="text" id="otpInput" placeholder="6-digit code" class="input-dark flex-[1.5]">
                    <button id="sendOtpBtn" class="flex-1 bg-blue-600 rounded-2xl text-[10px] font-black uppercase tracking-tighter active:scale-95 transition">Send Code</button>
                </div>
                <p id="timer" class="text-[10px] text-gray-500 text-center font-bold">Expires in: <span class="text-blue-400">01:00</span></p>
                
                <button id="savePassBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl font-black text-xs uppercase tracking-widest mt-2">Save New Password</button>
            </div>

            <div class="glass-card p-6 rounded-[2rem] space-y-4">
                <h4 class="text-purple-500 font-black text-xs uppercase italic">Update Email</h4>
                <input type="email" id="newEmail" placeholder="New Email Address" class="input-dark">
                <button id="saveEmailBtn" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-black text-xs uppercase tracking-widest">Update Email</button>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center">
            <a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a>
        </div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updatePassword, updateEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let generatedOtp = null;
        let timerInterval = null;

        // فتح/إغلاق قسم الأمان
        window.toggleSecurity = (open) => {
            document.getElementById('securitySection').classList.toggle('open', open);
        };

        // جلب بيانات المستخدم
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById('userName').innerText = d.fullName;
                    document.getElementById('userBalance').innerText = `$${parseFloat(d.balance).toFixed(2)}`;
                    document.getElementById('userPhone').innerText = d.phoneNumber;
                    document.getElementById('userEmail').innerText = user.email;
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${d.fullName}&background=2563eb&color=fff`;
                }
            } else { window.location.href = "login.html"; }
        });

        // نظام الـ OTP (محاكاة)
        document.getElementById('sendOtpBtn').addEventListener('click', () => {
            generatedOtp = Math.floor(100000 + Math.random() * 900000);
            alert("Verification Code Sent to: " + auth.currentUser.email + "\nCode: " + generatedOtp);
            
            let timeLeft = 60;
            const timerDisplay = document.querySelector('#timer span');
            document.getElementById('sendOtpBtn').disabled = true;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    generatedOtp = null;
                    document.getElementById('sendOtpBtn').disabled = false;
                    timerDisplay.innerText = "01:00";
                }
            }, 1000);
        });

        // حفظ كلمة السر الجديدة
        document.getElementById('savePassBtn').addEventListener('click', async () => {
            const p1 = document.getElementById('newPass').value;
            const p2 = document.getElementById('confirmPass').value;
            const otp = document.getElementById('otpInput').value;

            if (p1 !== p2) return alert("Passwords do not match!");
            if (p1.length < 6) return alert("Minimum 6 characters required!");
            if (otp != generatedOtp || !generatedOtp) return alert("Invalid or Expired Code!");

            try {
                await updatePassword(auth.currentUser, p1);
                alert("Password Updated Successfully!");
                toggleSecurity(false);
            } catch (e) { alert("Security timeout. Please logout and login again."); }
        });

        // تحديث الإيميل
        document.getElementById('saveEmailBtn').addEventListener('click', async () => {
            const email = document.getElementById('newEmail').value;
            try {
                await updateEmail(auth.currentUser, email);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { email: email });
                alert("Email Updated!");
                location.reload();
            } catch (e) { alert("Recent login required to update email."); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
