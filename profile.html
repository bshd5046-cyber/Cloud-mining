<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | VERTEX PREMIER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #020617; 
            --primary: #3b82f6; 
            --accent: #8b5cf6;
            --nav-bg: rgba(7, 10, 22, 0.98); 
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #ffffff; 
            background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.12) 0%, transparent 50%), #020617;
            min-height: 100vh;
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- البار السفلي الموحد (نسخة Support Center) --- */
        .bottom-nav { 
            background: var(--nav-bg); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            height: 85px; 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000; padding-bottom: 15px; 
        }

        .invest-fab { 
            width: 68px; height: 68px; 
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            position: relative; top: -28px; 
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.6); 
            border: 6px solid #020617; 
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #475569; text-decoration: none; font-size: 10px; font-weight: 700; transition: 0.3s; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
        /* ---------------------------------------------- */

        .profile-ring {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 3px;
            border-radius: 9999px;
        }

        .slide-panel {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 80vh;
            background: #0a0f1c; z-index: 2000; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid rgba(59, 130, 246, 0.2); border-radius: 2.5rem 2.5rem 0 0; padding: 2rem;
        }
        .slide-panel.active { bottom: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; z-index: 1500; }
    </style>
</head>
<body class="pb-32"> <div id="overlay" class="overlay" onclick="closeAllPanels()"></div>

    <main id="mainContent" class="opacity-0 transition-opacity duration-700">
        <div class="px-8 pt-10 pb-6 text-center">
            <div class="profile-ring inline-block mb-4">
                <div class="w-20 h-20 rounded-full bg-slate-900 overflow-hidden border-2 border-[#020617]">
                    <img id="userAvatar" src="" class="w-full h-full object-cover">
                </div>
            </div>
            <h2 id="userName" class="text-xl font-extrabold tracking-tight text-white mb-1 uppercase">---</h2>
            
            <div class="flex flex-col items-center gap-1.5 mt-3">
                <div class="flex items-center gap-2">
                    <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest">UID:</span>
                    <span id="userIdDisplay" class="text-[10px] text-blue-400 font-mono font-bold">---</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Phone:</span>
                    <span id="userPhoneDisplay" class="text-[10px] text-slate-300 font-bold">---</span>
                </div>
            </div>
        </div>

        <div class="px-6 mb-8">
            <div class="glass-panel p-6 rounded-[2.5rem] border-white/10 relative overflow-hidden">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em] mb-1">Available Assets</p>
                        <h1 id="userBalance" class="text-3xl font-black text-white">$0.00</h1>
                    </div>
                    <div id="userTierBadge" class="px-3 py-1.5 rounded-xl bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-black uppercase">
                        Loading...
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between text-[9px] font-black uppercase">
                        <span class="text-slate-500">Mining Status</span>
                        <span id="statusText" class="text-emerald-500">Live</span>
                    </div>
                    <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-blue-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-6 space-y-4">
            <h3 class="text-[11px] font-black text-slate-600 uppercase tracking-[0.3em] ml-4">Terminal Access</h3>
            <div class="glass-panel rounded-[2.5rem] overflow-hidden">
                <button onclick="togglePanel('securityPanel', true)" class="w-full flex items-center justify-between p-6 border-b border-white/5 active:bg-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-400 text-xl"><i class="fas fa-shield-halved"></i></div>
                        <div class="text-left">
                            <p class="text-[15px] font-bold text-white">Security Vault</p>
                            <p class="text-[11px] text-slate-500">Credentials Management</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-700 text-xs"></i>
                </button>

                <a href="invite.html" class="flex items-center justify-between p-6 border-b border-white/5 active:bg-white/5 text-decoration-none">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 text-xl"><i class="fas fa-users"></i></div>
                        <div class="text-left">
                            <p class="text-[15px] font-bold text-white">Affiliate Program</p>
                            <p class="text-[11px] text-slate-500">Referral Commissions</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-700 text-xs"></i>
                </a>

                <button id="logoutBtn" class="w-full flex items-center gap-4 p-6 active:bg-red-500/5">
                    <div class="w-12 h-12 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500 text-xl"><i class="fas fa-power-off"></i></div>
                    <p class="text-[15px] font-bold text-red-500">Terminate Session</p>
                </button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center">
            <a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a>
        </div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <div id="securityPanel" class="slide-panel">
        <button onclick="togglePanel('securityPanel', false)" class="mb-8 text-slate-400"><i class="fas fa-arrow-left text-xl"></i></button>
        <h3 class="text-xl font-bold mb-4">Security</h3>
        <p class="text-slate-400 text-sm mb-6">Password reset link will be sent to your email.</p>
        <button onclick="sendResetEmail()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Send Link</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.togglePanel = (id, show) => {
            document.getElementById(id).classList.toggle('active', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        };

        window.closeAllPanels = () => {
            document.querySelectorAll('.slide-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('overlay').style.display = 'none';
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('mainContent').classList.replace('opacity-0', 'opacity-100');
                document.getElementById('userIdDisplay').innerText = user.uid;

                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userName').innerText = data.fullName || "Member";
                    document.getElementById('userBalance').innerText = `$${parseFloat(data.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    document.getElementById('userPhoneDisplay').innerText = data.phone || "Not Linked";
                    
                    const tierBadge = document.getElementById('userTierBadge');
                    if (data.tier && data.tier.trim() !== "") {
                        tierBadge.innerText = data.tier;
                        document.getElementById('progressBar').style.width = "100%";
                    } else {
                        tierBadge.innerText = "Not Active";
                        tierBadge.classList.replace('text-blue-400', 'text-slate-500');
                        tierBadge.classList.replace('bg-blue-500/10', 'bg-white/5');
                        document.getElementById('statusText').innerText = "Inactive";
                        document.getElementById('statusText').classList.replace('text-emerald-500', 'text-slate-500');
                    }
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${data.fullName}&background=1e293b&color=3b82f6&bold=true`;
                }
            } else { window.location.replace("login.html"); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm("Terminate current session?")) { signOut(auth).then(() => window.location.replace("login.html")); }
        });
    </script>
</body>
</html>
