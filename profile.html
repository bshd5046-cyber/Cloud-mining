<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | VERTEX PREMIER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #050810; 
            --primary: #3b82f6; 
            --accent: #8b5cf6;
            --nav-bg: rgba(10, 15, 28, 0.96); 
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #ffffff; 
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.12) 0%, transparent 50%), #050810;
            min-height: 100vh;
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-ring {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 3px;
            border-radius: 9999px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .bottom-nav { 
            background: var(--nav-bg); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            height: 80px; position: fixed; bottom: 0; left: 0; right: 0; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }

        .invest-fab { 
            width: 60px; height: 60px; 
            background: linear-gradient(135deg, #2563eb, #7c3aed); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            position: relative; top: -20px; border: 4px solid var(--bg-dark); 
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #475569; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }

        .slide-panel {
            position: fixed; bottom: -100%; left: 0; right: 0; height: 80vh;
            background: #0a0f1c; z-index: 2000; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid rgba(59, 130, 246, 0.2); border-radius: 2.5rem 2.5rem 0 0; padding: 2rem;
        }
        .slide-panel.active { bottom: 0; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; z-index: 1500; }
        
        .badge-step {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
        }
    </style>
</head>
<body class="pb-24">

    <div id="overlay" class="overlay" onclick="closeAllPanels()"></div>

    <main id="mainContent" class="opacity-0 transition-opacity duration-700">
        <div class="px-8 pt-10 pb-6 text-center">
            <div class="profile-ring inline-block mb-4">
                <div class="w-20 h-20 rounded-full bg-slate-900 overflow-hidden border-2 border-[#050810]">
                    <img id="userAvatar" src="" class="w-full h-full object-cover">
                </div>
            </div>
            <h2 id="userName" class="text-xl font-extrabold tracking-tight text-white mb-1 uppercase">---</h2>
            
            <div class="flex items-center justify-center gap-3 mt-2">
                <span class="text-[10px] text-slate-500 font-bold bg-white/5 px-2 py-1 rounded">ID: <span id="userIdDisplay" class="text-slate-300">---</span></span>
                <span class="text-[10px] text-slate-500 font-bold bg-white/5 px-2 py-1 rounded"><i class="fas fa-phone text-[8px] mr-1"></i><span id="userPhoneDisplay" class="text-slate-300">---</span></span>
            </div>
        </div>

        <div class="px-6 mb-6">
            <div class="glass-panel p-5 rounded-[2rem] border-white/10 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-20 h-20 bg-blue-500/10 blur-3xl"></div>
                
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-1">Total Balance</p>
                        <h1 id="userBalance" class="text-2xl font-black text-white tracking-tight">$0.00</h1>
                    </div>
                    <div class="badge-step" id="userTier">Tier 1</div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between text-[9px] font-bold uppercase tracking-tighter">
                        <span class="text-slate-400">Current Phase</span>
                        <span class="text-blue-400">Active</span>
                    </div>
                    <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 rounded-full" style="width: 65%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-6 space-y-4">
            <h3 class="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] ml-2">Account Management</h3>
            
            <div class="glass-panel rounded-[2rem] overflow-hidden">
                <button onclick="togglePanel('securityPanel', true)" class="w-full flex items-center justify-between p-5 border-b border-white/5 active:bg-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400 text-lg"><i class="fas fa-shield-halved"></i></div>
                        <div class="text-left">
                            <p class="text-[13px] font-bold text-white">Security Vault</p>
                            <p class="text-[10px] text-slate-500">Protection & Recovery</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-700 text-xs"></i>
                </button>

                <a href="invite.html" class="flex items-center justify-between p-5 border-b border-white/5 active:bg-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 text-lg"><i class="fas fa-share-nodes"></i></div>
                        <div class="text-left">
                            <p class="text-[13px] font-bold text-white">Referral Hub</p>
                            <p class="text-[10px] text-slate-500">Commission Center</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-700 text-xs"></i>
                </a>

                <button onclick="togglePanel('downloadPanel', true)" class="w-full flex items-center justify-between p-5 border-b border-white/5 active:bg-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400 text-lg"><i class="fas fa-download"></i></div>
                        <div class="text-left">
                            <p class="text-[13px] font-bold text-white">Download App</p>
                            <p class="text-[10px] text-slate-500">Mobile Terminal</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-700 text-xs"></i>
                </button>

                <button id="logoutBtn" class="w-full flex items-center gap-4 p-5 active:bg-red-500/5">
                    <div class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center text-red-500 text-lg"><i class="fas fa-power-off"></i></div>
                    <p class="text-[13px] font-bold text-red-500">Logout Session</p>
                </button>
            </div>
        </div>
    </main>

    <div id="downloadPanel" class="slide-panel">
        <div class="flex items-center justify-between mb-8">
            <button onclick="togglePanel('downloadPanel', false)" class="text-slate-400"><i class="fas fa-xmark text-xl"></i></button>
            <h4 class="text-sm font-black tracking-widest uppercase">App Installer</h4>
            <div class="w-6"></div>
        </div>
        <div class="space-y-4">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <div class="flex items-center gap-4 mb-4">
                    <i class="fab fa-android text-2xl text-emerald-500"></i>
                    <h5 class="font-bold text-sm">Android APK</h5>
                </div>
                <button class="w-full bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase">Download Now</button>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                <div class="flex items-center gap-4 mb-4">
                    <i class="fab fa-apple text-2xl text-white"></i>
                    <h5 class="font-bold text-sm">iOS Guide (PWA)</h5>
                </div>
                <p class="text-[10px] text-slate-400">Open in Safari > Share > Add to Home Screen</p>
            </div>
        </div>
    </div>

    <div id="securityPanel" class="slide-panel">
        <div id="securityContent">
            <button onclick="togglePanel('securityPanel', false)" class="mb-6 text-slate-400"><i class="fas fa-arrow-left text-xl"></i></button>
            <h3 class="text-xl font-bold mb-6">Security Vault</h3>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 mb-6">
                <p class="text-[9px] text-slate-500 uppercase font-bold">Email Address</p>
                <p id="recoveryEmail" class="text-blue-400 font-bold text-sm">---</p>
            </div>
            <button id="sendBtn" onclick="sendResetEmail()" class="w-full bg-blue-500 py-4 rounded-xl font-black uppercase text-[11px] tracking-widest">Send Reset Link</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house mb-1 text-lg"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet mb-1 text-lg"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center"><a href="invest.html" class="invest-fab"><i class="fas fa-bolt text-xl text-white"></i></a></div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset mb-1 text-lg"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-gear mb-1 text-lg"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.togglePanel = (panelId, show) => {
            const panel = document.getElementById(panelId);
            const overlay = document.getElementById('overlay');
            if (show) { panel.classList.add('active'); overlay.style.display = 'block'; }
            else { panel.classList.remove('active'); overlay.style.display = 'none'; }
        };

        window.closeAllPanels = () => {
            document.querySelectorAll('.slide-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('overlay').style.display = 'none';
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('mainContent').classList.replace('opacity-0', 'opacity-100');
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById('userName').innerText = d.fullName || "User";
                    document.getElementById('userBalance').innerText = `$${parseFloat(d.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    document.getElementById('userIdDisplay').innerText = user.uid.substring(0, 8).toUpperCase();
                    document.getElementById('userPhoneDisplay').innerText = d.phone || "No Phone";
                    document.getElementById('userTier').innerText = d.tier || "VIP 1";
                    document.getElementById('recoveryEmail').innerText = user.email;
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${d.fullName}&background=1e293b&color=3b82f6&bold=true`;
                }
            } else { window.location.replace("login.html"); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm("Terminate session?")) { signOut(auth).then(() => window.location.replace("login.html")); }
        });
    </script>
</body>
</html>
