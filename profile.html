<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | AMANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #050810; --primary: #3b82f6; --nav-bg: rgba(10, 15, 28, 0.95); }
        body { background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow: hidden; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* تصميم القسم الداخلي للأمان */
        #securitySection {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 250; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #securitySection.open { right: 0; }

        .bottom-nav { background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.08); height: 75px; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .invest-fab { width: 68px; height: 68px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: -32px; left: 50%; transform: translateX(-50%); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); border: 6px solid var(--bg-dark); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .input-dark { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1rem; width: 100%; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="min-h-screen">

    <main id="mainProfile" class="h-screen overflow-y-auto pb-32">
        <div class="relative px-6 pt-12 pb-8 text-center bg-gradient-to-b from-blue-900/20 to-transparent">
            <div class="w-24 h-24 rounded-full border-2 border-blue-500/50 p-1 mx-auto">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" class="w-full h-full rounded-full object-cover">
            </div>
            <h2 id="userName" class="mt-4 text-2xl font-black italic">Loading...</h2>
            <span class="inline-block mt-2 bg-blue-500/10 text-blue-400 text-[10px] font-black px-3 py-1 rounded-full uppercase italic">Verified Investor</span>
        </div>

        <div class="grid grid-cols-2 gap-4 px-6 mb-8">
            <div class="glass-card p-5 rounded-[2rem]">
                <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Balance</p>
                <p id="userBalance" class="text-xl font-black text-white">$0.00</p>
            </div>
            <div class="glass-card p-5 rounded-[2rem]">
                <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Phone</p>
                <p id="userPhone" class="text-xs font-bold text-blue-400">---</p>
            </div>
        </div>

        <div class="px-6 space-y-4">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2">General</h3>
            <div class="glass-card rounded-[2.5rem] overflow-hidden divide-y divide-white/5">
                
                <button onclick="toggleSecurity(true)" class="w-full flex items-center justify-between p-6 active:bg-white/5 transition text-left">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500"><i class="fas fa-shield-halved"></i></div>
                        <div>
                            <p class="text-sm font-bold">Security Settings</p>
                            <p class="text-[9px] text-gray-500 uppercase font-medium">Email & Password</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-xs text-gray-700"></i>
                </button>

                <button id="logoutBtn" class="w-full flex items-center gap-4 p-6 active:bg-red-500/10 transition group">
                    <div class="w-11 h-11 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500"><i class="fas fa-power-off"></i></div>
                    <span class="text-sm font-bold text-red-500">Logout</span>
                </button>
            </div>
        </div>
    </main>

    <section id="securitySection" class="p-6">
        <div class="flex items-center gap-4 mb-8 pt-6">
            <button onclick="toggleSecurity(false)" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                <i class="fas fa-arrow-left text-sm"></i>
            </button>
            <h2 class="text-xl font-black italic uppercase">Security Settings</h2>
        </div>

        <div class="space-y-6">
            <div class="glass-card p-6 rounded-[2rem]">
                <label class="text-[10px] font-black text-gray-500 uppercase mb-3 block">Update Email Address</label>
                <input type="email" id="newEmail" placeholder="New email address" class="input-dark mb-4">
                <button id="saveEmail" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition">Update Email</button>
            </div>

            <div class="glass-card p-6 rounded-[2rem]">
                <label class="text-[10px] font-black text-gray-500 uppercase mb-3 block">Change Password</label>
                <input type="password" id="newPass" placeholder="New password (min 6 chars)" class="input-dark mb-4">
                <button id="savePass" class="w-full py-4 bg-white/10 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition">Update Password</button>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center">
            <a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a>
        </div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateEmail, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // فتح وإغلاق قسم الأمان
        window.toggleSecurity = (open) => {
            const sec = document.getElementById('securitySection');
            open ? sec.classList.add('open') : sec.classList.remove('open');
        }

        // جلب البيانات
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById('userName').innerText = d.fullName;
                    document.getElementById('userBalance').innerText = `$${parseFloat(d.balance).toFixed(2)}`;
                    document.getElementById('userPhone').innerText = d.phoneNumber;
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${d.fullName}&background=2563eb&color=fff`;
                }
            } else { window.location.href = "login.html"; }
        });

        // تنفيذ التحديثات
        document.getElementById('saveEmail').addEventListener('click', async () => {
            const email = document.getElementById('newEmail').value;
            try {
                await updateEmail(auth.currentUser, email);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { email: email });
                alert("Email Updated!");
                location.reload();
            } catch (e) { alert("Security: Please Re-login to update email"); }
        });

        document.getElementById('savePass').addEventListener('click', async () => {
            const pass = document.getElementById('newPass').value;
            try {
                await updatePassword(auth.currentUser, pass);
                alert("Password Changed Successfully!");
                toggleSecurity(false);
            } catch (e) { alert("Security: Please Re-login to change password"); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
