<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | VERTEX PREMIER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #050810; --primary: #3b82f6; --nav-bg: rgba(10, 15, 28, 0.95); }
        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #ffffff; 
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #050810 100%);
        }
        #mainProfile { display: none; }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .profile-ring {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            padding: 3px;
            border-radius: 9999px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        /* المنيو السفلي الموحد */
        .bottom-nav { background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.08); height: 80px; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; padding-bottom: 10px; }
        .invest-fab { width: 65px; height: 65px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; top: -25px; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); border: 5px solid var(--bg-dark); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body class="pb-32">

    <main id="mainProfile">
        <div class="px-8 pt-16 pb-10 text-center relative">
            <div class="profile-ring inline-block mb-6 shadow-xl">
                <div class="w-24 h-24 rounded-full bg-slate-900 overflow-hidden border-4 border-slate-950">
                    <img id="userAvatar" src="" class="w-full h-full object-cover">
                </div>
            </div>
            <h2 id="userName" class="text-2xl font-extrabold tracking-tight text-white mb-1 uppercase italic">Loading...</h2>
            <p id="userEmailDisplay" class="text-slate-400 text-xs font-medium tracking-wide">---</p>
        </div>

        <div class="px-6 space-y-4 mb-8">
            <div class="glass-panel p-6 rounded-[2rem] flex items-center justify-between border-t border-white/10">
                <div>
                    <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Total Equity</p>
                    <p id="userBalance" class="text-3xl font-black text-white tracking-tighter">$0.00</p>
                </div>
                <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 border border-blue-500/20 shadow-inner">
                    <i class="fas fa-wallet text-xl"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 rounded-[2rem] border-l-2 border-blue-500">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Phone Number</p>
                    <p id="userPhone" class="text-sm font-bold text-slate-200">---</p>
                </div>
                <div class="glass-panel p-5 rounded-[2rem] border-l-2 border-indigo-500">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Node ID</p>
                    <p id="userInviteCode" class="text-sm font-black text-blue-400">---</p>
                </div>
            </div>
        </div>

        <div class="px-6 space-y-3">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-2 mb-2">Protocol Controls</h3>
            
            <a href="invite.html" class="glass-panel flex items-center justify-between p-6 rounded-[2rem] active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-11 h-11 rounded-2xl bg-indigo-500/10 flex items-center justify-center text-indigo-400"><i class="fas fa-crown"></i></div>
                    <div>
                        <p class="text-sm font-bold text-white">Expansion Program</p>
                        <p class="text-[10px] text-slate-500">Invite & Earn Commissions</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-xs text-slate-700"></i>
            </a>

            <button onclick="requestPasswordReset()" class="w-full glass-panel flex items-center justify-between p-6 rounded-[2rem] active:scale-95 transition-all text-left">
                <div class="flex items-center gap-4">
                    <div class="w-11 h-11 rounded-2xl bg-slate-500/10 flex items-center justify-center text-slate-400"><i class="fas fa-key"></i></div>
                    <div>
                        <p class="text-sm font-bold text-white">Security Keys</p>
                        <p class="text-[10px] text-slate-500">Update Access Password</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-xs text-slate-700"></i>
            </button>

            <button id="logoutBtn" class="w-full glass-panel flex items-center gap-4 p-6 rounded-[2rem] active:bg-red-500/10 transition-all text-left text-red-500">
                <div class="w-11 h-11 rounded-2xl bg-red-500/10 flex items-center justify-center"><i class="fas fa-power-off"></i></div>
                <p class="text-sm font-bold">Terminate Session</p>
            </button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <div class="relative flex-1 flex justify-center"><a href="invest.html" class="invest-fab"><i class="fas fa-bolt-lightning text-2xl text-white"></i></a></div>
        <a href="support.html" class="nav-item"><i class="fas fa-headset"></i><span>Support</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-circle-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // وظيفة تغيير كلمة السر
        window.requestPasswordReset = async () => {
            const email = auth.currentUser.email;
            if (confirm("Send password reset link to: " + email + "?")) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert("Security link sent to your inbox.");
                } catch (e) { alert("System Error: " + e.message); }
            }
        };

        // جلب البيانات من Firebase
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('mainProfile').style.display = 'block';
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById('userName').innerText = d.fullName || "User";
                    document.getElementById('userBalance').innerText = `$${parseFloat(d.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    document.getElementById('userEmailDisplay').innerText = user.email;
                    document.getElementById('userPhone').innerText = d.phoneNumber || "NOT SET";
                    document.getElementById('userInviteCode').innerText = d.myReferralCode || user.uid.substring(0, 5).toUpperCase();
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${d.fullName}&background=0f172a&color=3b82f6&bold=true&size=256`;
                }
            } else { window.location.replace("login.html"); }
        });

        // تسجيل الخروج
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm("Are you sure you want to terminate session?")) {
                signOut(auth).then(() => window.location.replace("login.html"));
            }
        });
    </script>
</body>
</html>
