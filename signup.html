<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex | Establish Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand: #3b82f6; --bg: #010208; --glass: rgba(255, 255, 255, 0.01); }
        body { 
            background: var(--bg); color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow-x: hidden; position: relative;
        }

        /* خلفية الفضاء العميق */
        .deep-space-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 70%), var(--bg);
        }

        /* الاسم الزجاجي اللماع */
        .glass-title {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.5rem;
            background: linear-gradient(135deg, #fff 30%, #3b82f6 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));
        }

        /* حاوية زجاجية مع إطار نيون متدفق */
        .cyber-card {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px); border-radius: 40px; position: relative;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }

        .cyber-card::before {
            content: ""; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 41px; z-index: -1;
            background: linear-gradient(135deg, transparent, rgba(59, 130, 246, 0.4), transparent);
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; }
        }

        .floating-input {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.4s all ease;
        }

        .floating-input:focus-within {
            border-color: var(--brand); transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15);
        }

        /* حقل الإحالة الذهبي */
        .referral-glow {
            border: 1px solid rgba(245, 158, 11, 0.2) !important;
            background: rgba(245, 158, 11, 0.02) !important;
        }

        .btn-stellar {
            background: #ffffff; color: #000; font-weight: 900;
            letter-spacing: 2px; transition: 0.3s;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.4);
        }

        .btn-stellar:hover { box-shadow: 0 15px 50px rgba(255, 255, 255, 0.6); transform: translateY(-2px); }

        #alertBox { transform: translateY(-120%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #alertBox.show { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="deep-space-bg"></div>

    <div id="alertBox" class="fixed top-6 left-6 right-6 z-[200] hidden">
        <div id="alertBg" class="p-5 rounded-2xl border flex items-center gap-4 shadow-2xl backdrop-blur-3xl bg-black/90">
            <i id="alertIcon" class="fas text-xl"></i>
            <p id="alertMsg" class="text-xs font-black uppercase tracking-widest"></p>
        </div>
    </div>

    <div class="w-full max-w-[460px] p-6 animate-fade-in relative z-10">
        
        <div class="text-center mb-10">
            <h1 class="glass-title">VERTEX</h1>
            <p class="text-[9px] text-blue-400 font-bold uppercase tracking-[0.5em] mt-2">Initialize New Node</p>
        </div>

        <div class="cyber-card p-8 md:p-10">
            <div class="space-y-4">
                <div class="floating-input rounded-2xl flex items-center p-4">
                    <i class="fas fa-user-astronaut text-blue-500/50 mr-4 w-5"></i>
                    <input type="text" id="fullName" placeholder="FULL NAME" class="bg-transparent border-none outline-none w-full text-[11px] font-bold tracking-wider">
                </div>

                <div class="flex gap-2">
                    <div class="floating-input rounded-2xl flex items-center px-3 py-4 w-28">
                        <select id="countryCode" class="bg-transparent border-none outline-none w-full text-[10px] font-black text-blue-400">
                            <option value="+966">🇸🇦 +966</option>
                            <option value="+971">🇦🇪 +971</option>
                            <option value="+964">🇮🇶 +964</option>
                            <option value="+20">🇪🇬 +20</option>
                        </select>
                    </div>
                    <div class="floating-input rounded-2xl flex-1 flex items-center p-4">
                        <input type="tel" id="phone" placeholder="PHONE NUMBER" class="bg-transparent border-none outline-none w-full text-[11px] font-bold tracking-wider">
                    </div>
                </div>

                <div class="floating-input rounded-2xl flex items-center p-4">
                    <i class="fas fa-envelope text-blue-500/50 mr-4 w-5"></i>
                    <input type="email" id="email" placeholder="ACCESS EMAIL" class="bg-transparent border-none outline-none w-full text-[11px] font-bold tracking-wider">
                </div>

                <div class="floating-input rounded-2xl flex items-center p-4">
                    <i class="fas fa-key text-blue-500/50 mr-4 w-5"></i>
                    <input type="password" id="password" placeholder="PASSWORD" class="bg-transparent border-none outline-none w-full text-[11px] font-bold tracking-wider">
                </div>

                <div class="floating-input referral-glow rounded-2xl flex items-center p-4">
                    <i class="fas fa-ticket text-amber-500 mr-4 w-5"></i>
                    <input type="text" id="inviteCode" placeholder="MANDATORY INVITE CODE" class="bg-transparent border-none outline-none w-full text-[11px] font-black text-amber-500 placeholder:text-amber-900/50">
                </div>

                <button id="signupBtn" class="btn-stellar w-full py-5 rounded-2xl text-[11px] mt-6 uppercase active:scale-95">
                    Establish Node
                </button>
            </div>

            <div class="mt-8 text-center">
                <p class="text-gray-600 text-[9px] font-black uppercase tracking-widest">
                    Linked to Network? <a href="login.html" class="text-blue-500 ml-1">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showAlert(message, type = "error") {
            const box = document.getElementById('alertBox');
            const bg = document.getElementById('alertBg');
            const icon = document.getElementById('alertIcon');
            const msg = document.getElementById('alertMsg');
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('show'), 10);
            
            if(type === "error") {
                bg.style.borderColor = "rgba(239, 68, 68, 0.5)";
                icon.className = "fas fa-radiation text-red-500 animate-spin";
                msg.style.color = "#fecaca";
            } else {
                bg.style.borderColor = "rgba(34, 197, 94, 0.5)";
                icon.className = "fas fa-satellite-dish text-green-500";
                msg.style.color = "#bbf7d0";
            }
            msg.innerText = message;
            setTimeout(() => {
                box.classList.remove('show');
                setTimeout(() => box.classList.add('hidden'), 500);
            }, 3000);
        }

        document.getElementById('signupBtn').addEventListener('click', async () => {
            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const invite = document.getElementById('inviteCode').value.trim();

            if (!name || !phone || !email || !password) {
                showAlert("CRITICAL: ALL CHANNELS MUST BE FILLED");
                return;
            }

            // تحقق كود الإحالة الإجباري
            if (!invite) {
                showAlert("ACCESS DENIED: VALID INVITE CODE REQUIRED");
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.innerText = "INITIALIZING CORE...";
            btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const myPersonalCode = user.uid.substring(0, 5).toUpperCase();

                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    phoneNumber: document.getElementById('countryCode').value + phone,
                    email: email,
                    referralId: myPersonalCode,
                    inviteCode: invite,
                    balance: 0,
                    tier: "STARTER",
                    createdAt: new Date().toISOString()
                });

                showAlert("NODE ESTABLISHED SUCCESSFULLY", "success");
                setTimeout(() => window.location.href = "index.html", 1500);
            } catch (error) {
                btn.innerText = "ESTABLISH NODE";
                btn.disabled = false;
                showAlert(error.message.toUpperCase());
            }
        });
    </script>
</body>
</html>
