<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
        authDomain: "cloud-mining-6f190.firebaseapp.com",
        projectId: "cloud-mining-6f190",
        storageBucket: "cloud-mining-6f190.firebasestorage.app",
        messagingSenderId: "144227180849",
        appId: "1:144227180849:web:ccbda447d074efbbddd010"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- وظيفة جلب الكود من الرابط تلقائياً ---
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const refFromUrl = urlParams.get('ref');
        if (refFromUrl) {
            const inviteInput = document.getElementById('inviteCode');
            inviteInput.value = refFromUrl;
            // اختياري: جعل الحقل للقراءة فقط إذا جاء من رابط لمنع الخطأ
            // inviteInput.readOnly = true; 
        }
    };

    function showAlert(message, type = "error") {
        const box = document.getElementById('alertBox');
        const bg = document.getElementById('alertBg');
        const icon = document.getElementById('alertIcon');
        const msg = document.getElementById('alertMsg');

        box.classList.remove('hidden');
        setTimeout(() => box.classList.add('show'), 10);

        if(type === "error") {
            bg.className = "p-4 rounded-2xl border border-red-500/50 flex items-center gap-3 shadow-2xl backdrop-blur-xl bg-red-500/10";
            icon.className = "fas fa-circle-exclamation text-red-500 text-lg";
            msg.className = "text-xs font-bold uppercase tracking-wide text-red-200";
        } else {
            bg.className = "p-4 rounded-2xl border border-green-500/50 flex items-center gap-3 shadow-2xl backdrop-blur-xl bg-green-500/10";
            icon.className = "fas fa-circle-check text-green-500 text-lg";
            msg.className = "text-xs font-bold uppercase tracking-wide text-green-200";
        }

        msg.innerText = message;
        setTimeout(() => {
            box.classList.remove('show');
            setTimeout(() => box.classList.add('hidden'), 400);
        }, 3000);
    }

    document.getElementById('signupBtn').addEventListener('click', async () => {
        const name = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        const invite = document.getElementById('inviteCode').value.trim();

        // التعديل: التحقق من كود الدعوة (إجباري)
        if (!name || !phone || !email || !password || !invite) {
            showAlert("Access Denied! Invite code and all fields are required.");
            return;
        }

        if (password !== confirmPass) {
            showAlert("Passwords do not match!");
            return;
        }

        const btn = document.getElementById('signupBtn');
        btn.innerText = "AUTHENTICATING...";
        btn.disabled = true;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await setDoc(doc(db, "users", user.uid), {
                fullName: name,
                phoneNumber: document.getElementById('countryCode').value + phone,
                email: email,
                inviteCode: invite, // يتم تخزينه هنا
                balance: 0,
                createdAt: new Date().toISOString()
            });

            showAlert("Node Created! Redirecting...", "success");
            setTimeout(() => window.location.href = "index.html", 1500);

        } catch (error) {
            btn.innerText = "CREATE ACCOUNT";
            btn.disabled = false;
            let userMsg = error.message;
            if (error.code === 'auth/email-already-in-use') userMsg = "Email already linked to another node!";
            showAlert(userMsg);
        }
    });
</script>
