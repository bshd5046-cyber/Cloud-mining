<script type="module">
    // 1. استيراد مكتبات Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
        authDomain: "cloud-mining-6f190.firebaseapp.com",
        projectId: "cloud-mining-6f190",
        storageBucket: "cloud-mining-6f190.firebasestorage.app",
        messagingSenderId: "144227180849",
        appId: "1:144227180849:web:ccbda447d074efbbddd010"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- وظيفة جلب كود الدعوة من الرابط تلقائياً عند فتح الصفحة ---
    window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const refFromUrl = urlParams.get('ref');
        const inviteInput = document.getElementById('inviteCode');

        if (refFromUrl && inviteInput) {
            inviteInput.value = refFromUrl;
            // قفل الحقل لضمان عدم تغيير كود الشخص الذي دعا المستخدم
            inviteInput.readOnly = true;
            inviteInput.classList.add('opacity-70'); // تظليل خفيف لبيان أنه مقفل
            console.log("Protocol: Referral code injected - " + refFromUrl);
        }
    });

    // --- وظيفة إظهار التنبيهات الجمالية ---
    function showAlert(message, type = "error") {
        const box = document.getElementById('alertBox');
        const bg = document.getElementById('alertBg');
        const icon = document.getElementById('alertIcon');
        const msg = document.getElementById('alertMsg');

        box.classList.remove('hidden');
        setTimeout(() => box.classList.add('show'), 10);

        if(type === "error") {
            bg.className = "p-4 rounded-2xl border border-red-500/50 flex items-center gap-3 shadow-2xl backdrop-blur-xl bg-red-500/10";
            icon.className = "fas fa-circle-exclamation text-red-500 text-lg";
            msg.className = "text-xs font-bold uppercase tracking-wide text-red-200";
        } else {
            bg.className = "p-4 rounded-2xl border border-green-500/50 flex items-center gap-3 shadow-2xl backdrop-blur-xl bg-green-500/10";
            icon.className = "fas fa-circle-check text-green-500 text-lg";
            msg.className = "text-xs font-bold uppercase tracking-wide text-green-200";
        }

        msg.innerText = message;
        setTimeout(() => {
            box.classList.remove('show');
            setTimeout(() => box.classList.add('hidden'), 400);
        }, 3000);
    }

    // --- معالجة عملية إنشاء الحساب ---
    document.getElementById('signupBtn').addEventListener('click', async () => {
        const name = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        const invite = document.getElementById('inviteCode').value.trim();

        // التحقق من أن جميع الحقول ممتلئة (كود الدعوة إجباري الآن)
        if (!name || !phone || !email || !password || !invite) {
            showAlert("Access Denied! All fields including Invite Code are required.");
            return;
        }

        if (password !== confirmPass) {
            showAlert("Identity Conflict! Passwords do not match.");
            return;
        }

        if (password.length < 6) {
            showAlert("Security Breach! Password must be at least 6 characters.");
            return;
        }

        const btn = document.getElementById('signupBtn');
        const originalText = btn.innerText;
        btn.innerText = "AUTHENTICATING...";
        btn.disabled = true;

        try {
            // خطوة 1: إنشاء الحساب في Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // خطوة 2: حفظ بيانات المستخدم الإضافية في Firestore
            await setDoc(doc(db, "users", user.uid), {
                fullName: name,
                phoneNumber: document.getElementById('countryCode').value + phone,
                email: email,
                inviteCode: invite, // حفظ كود الشخص الذي دعاه
                balance: 0,
                status: "active",
                createdAt: new Date().toISOString()
            });

            showAlert("Node Created! Redirecting to Terminal...", "success");
            
            // توجيه المستخدم لصفحة البداية بعد ثانية ونصف
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);

        } catch (error) {
            btn.innerText = originalText;
            btn.disabled = false;
            
            let userMsg = "Connection Error: " + error.message;
            if (error.code === 'auth/email-already-in-use') {
                userMsg = "Email already linked to another active node!";
            } else if (error.code === 'auth/invalid-email') {
                userMsg = "Invalid Email format!";
            } else if (error.code === 'auth/weak-password') {
                userMsg = "Password is too weak!";
            }
            
            showAlert(userMsg);
            console.error("Firebase Error:", error.code);
        }
    });
</script>
