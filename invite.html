<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERTEX | Referral Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --bg: #020617; --brand: #3b82f6; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100vh; }
        .hero-gradient { background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #020617 70%); }
        
        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            display: inline-block;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        .copy-btn {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .copy-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* ستايل زر الرجوع */
        .back-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            transition: 0.3s;
        }
        .back-btn:active { background: rgba(255, 255, 255, 0.15); transform: translateX(-3px); }
    </style>
</head>
<body class="hero-gradient">

    <header class="p-6 pt-10 flex items-center justify-between">
        <a href="profile.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="flex-1 text-center mr-11">
            <h1 class="text-xl font-black italic tracking-tighter text-white">NETWORK</h1>
            <p class="text-[9px] text-blue-400 font-bold uppercase tracking-[0.2em]">Referral Protocol</p>
        </div>
    </header>

    <main class="px-6 space-y-6 pb-12">
        
        <div class="glass-card p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <i class="fas fa-network-wired text-6xl"></i>
            </div>
            
            <div class="qr-container mb-6">
                <div id="qrcode"></div> 
            </div>
            
            <div class="space-y-2">
                <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Your Unique Protocol ID</p>
                <h3 id="refCodeDisplay" class="text-3xl font-black tracking-[0.2em] text-white">------</h3>
            </div>
        </div>

        <div class="glass-card p-5">
            <p class="text-[10px] text-gray-500 font-black uppercase mb-3 px-1">Referral Link</p>
            <div class="flex items-center gap-3 bg-black/40 p-2 pl-4 rounded-2xl border border-white/5">
                <input id="refLinkInput" type="text" readonly 
                       class="bg-transparent border-none text-[11px] text-blue-400 font-bold w-full focus:outline-none" 
                       value="Initializing Protocol...">
                <button id="copyBtn" class="copy-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">
                    Copy
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="glass-card p-5">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Active Nodes</p>
                <p id="activeNodesCount" class="text-xl font-black text-white">0</p>
            </div>
            <div class="glass-card p-5">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Team Bonus</p>
                <p class="text-xl font-black text-emerald-400">+0.00%</p>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmlAKs35FG4hbcaPkVQ_s0FSaZsvWzFak",
            authDomain: "cloud-mining-6f190.firebaseapp.com",
            projectId: "cloud-mining-6f190",
            storageBucket: "cloud-mining-6f190.firebasestorage.app",
            messagingSenderId: "144227180849",
            appId: "1:144227180849:web:ccbda447d074efbbddd010"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        const userCode = userData.myReferralCode || user.uid.substring(0, 5).toUpperCase();
                        
                        setupReferralUI(userCode);
                        countReferrals(userCode);
                    }
                } catch (error) {
                    console.error("Error loading referral data:", error);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        function setupReferralUI(code) {
            const currentPath = window.location.origin + window.location.pathname.replace('invite.html', 'signup.html');
            const refLink = `${currentPath}?ref=${code}`;

            document.getElementById('refCodeDisplay').innerText = code;
            document.getElementById('refLinkInput').value = refLink;

            document.getElementById("qrcode").innerHTML = ""; 
            new QRCode(document.getElementById("qrcode"), {
                text: refLink,
                width: 160,
                height: 160,
                colorDark : "#020617",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        async function countReferrals(code) {
            try {
                const q = query(collection(db, "users"), where("inviteCode", "==", code));
                const querySnapshot = await getDocs(q);
                document.getElementById('activeNodesCount').innerText = querySnapshot.size;
            } catch (e) {
                console.error("Error counting referrals:", e);
            }
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            const copyText = document.getElementById("refLinkInput");
            navigator.clipboard.writeText(copyText.value).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerText;
                btn.innerText = "DONE!";
                setTimeout(() => { btn.innerText = originalText; }, 1500);
            });
        });
    </script>
</body>
</html>
